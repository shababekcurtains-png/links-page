<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبابيك للستائر - بطاقة التواصل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #2b1e16;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* الصورة الأصلية كخلفية (التي تحتوي على QR code) */
        .custom-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772594834/%D8%AA%D8%B5%D9%85%D9%8A%D9%85_%D8%A8%D8%AF%D9%88%D9%86_%D8%B9%D9%86%D9%88%D8%A7%D9%86_1_kmg4fd.png') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* طبقة شفافة داكنة لتحسين وضوح العناصر */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 15px 80px;
        }

        /* الحاوية الرئيسية للشعار والأيقونات */
        .center-wrapper {
            position: relative;
            width: 350px;
            height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        /* الشعار ثلاثي الأبعاد في المنتصف */
        .logo-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(145deg, #d9b382, #b58f5a);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.6),
                0 0 0 5px #d9b38280,
                inset 0 -5px 15px rgba(0,0,0,0.4);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(10deg) rotateY(5deg);
            z-index: 20;
            animation: logo3d 5s infinite ease-in-out;
            border: 2px solid rgba(255,255,255,0.3);
        }

        @keyframes logo3d {
            0%, 100% { 
                transform: translate(-50%, -50%) rotateX(10deg) rotateY(5deg) scale(1);
                box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 5px #d9b38280;
            }
            50% { 
                transform: translate(-50%, -50%) rotateX(5deg) rotateY(-5deg) scale(1.05);
                box-shadow: 0 30px 50px rgba(217,179,130,0.4), 0 0 0 8px #d9b382;
            }
        }

        .logo-text {
            text-align: center;
            color: #2b1e16;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.3);
            transform: rotateX(-5deg);
        }

        .logo-text .line1 {
            font-size: 22px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 2px;
        }

        .logo-text .line2 {
            font-size: 18px;
            font-weight: 800;
            margin: 2px 0;
        }

        .logo-text .line3 {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .logo-text .line4 {
            font-size: 10px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* الأيقونات ثلاثية الأبعاد الدوارة حول الشعار */
        .icon-item {
            position: absolute;
            width: 70px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
            z-index: 10;
            transform-style: preserve-3d;
            animation: orbitRotate 15s linear infinite;
            animation-delay: calc(var(--icon-index) * -2s);
        }

        /* حركة مدارية ثلاثية الأبعاد */
        @keyframes orbitRotate {
            0% { 
                transform: rotate(0deg) translateX(120px) rotate(0deg) scale(1);
                filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
            }
            25% { 
                transform: rotate(90deg) translateX(120px) rotate(-90deg) scale(1.1);
                filter: drop-shadow(0 20px 30px #d9b382);
            }
            50% { 
                transform: rotate(180deg) translateX(120px) rotate(-180deg) scale(1);
                filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
            }
            75% { 
                transform: rotate(270deg) translateX(120px) rotate(-270deg) scale(1.1);
                filter: drop-shadow(0 20px 30px #d9b382);
            }
            100% { 
                transform: rotate(360deg) translateX(120px) rotate(-360deg) scale(1);
                filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6));
            }
        }

        .icon-item:hover {
            animation-play-state: paused;
            transform: scale(1.4) translateY(-10px) !important;
            filter: drop-shadow(0 25px 35px #d9b382);
            z-index: 30;
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid rgba(217,179,130,0.8);
            margin-bottom: 5px;
            transition: all 0.4s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.2);
            transform: rotateX(10deg);
        }

        .icon-item:hover .icon-circle {
            background: rgba(217,179,130,0.3);
            border-color: #d9b382;
            transform: rotateX(0deg) rotate(360deg);
            box-shadow: 0 0 40px #d9b382;
        }

        .icon-label {
            font-size: 10px;
            font-weight: 700;
            color: white;
            text-align: center;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            white-space: nowrap;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(217,179,130,0.5);
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            transform: rotateX(5deg);
        }

        /* ألوان الأيقونات */
        .fa-store { color: #ffd700; }
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-facebook { color: #1877F2; }
        .fa-tiktok { color: #ffffff; }
        .fa-youtube { color: #FF0000; }
        .fa-x-twitter { color: #ffffff; }
        .fa-snapchat { color: #FFFC00; }
        .fa-telegram { color: #0088cc; }

        /* رابط إضافة جهة الاتصال في الأسفل */
        .contact-link {
            text-align: center;
            animation: fadeInUp 0.6s ease 0.5s both;
            margin-bottom: 10px;
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 30px;
            border-radius: 60px;
            border: 2px solid #d9b382;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .contact-button:hover {
            transform: scale(1.05);
            background: rgba(217,179,130,0.3);
            box-shadow: 0 15px 35px rgba(217,179,130,0.4);
        }

        .contact-button i {
            font-size: 20px;
            color: #d9b382;
        }

        .contact-button span {
            font-size: 16px;
            font-weight: 700;
        }

        .contact-button .fa-phone-alt {
            color: #d9b382;
            animation: ring 2s infinite;
        }

        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
            60% { transform: rotate(10deg); }
            80% { transform: rotate(-10deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* لوحة التحكم */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .admin-panel.show { display: flex; }

        .admin-content {
            background: white;
            width: 100%;
            max-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #d9b382;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #d9b382;
        }

        .admin-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
        }

        .admin-tabs {
            display: flex;
            gap: 3px;
            margin-bottom: 10px;
        }

        .admin-tab {
            flex: 1;
            padding: 6px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .admin-tab.active { background: #d9b382; color: white; }

        .admin-section {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .admin-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 6px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 12px;
        }

        .admin-btn {
            padding: 8px;
            font-size: 13px;
        }

        .admin-list {
            max-height: 180px;
        }

        .admin-item {
            padding: 6px;
        }

        .admin-item-btn {
            width: 28px;
            height: 28px;
            font-size: 11px;
        }

        .notification {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #2b1e16;
            padding: 6px 15px;
            border-radius: 30px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3), 0 0 0 2px #d9b382;
            display: none;
            z-index: 3000;
            font-size: 11px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <!-- الخلفية الأصلية مع QR code -->
    <div class="custom-bg"></div>
    <div class="overlay"></div>

    <div class="container">
        <!-- الحاوية التي تضم الشعار والأيقونات -->
        <div class="center-wrapper" id="centerWrapper">
            <!-- الشعار ثلاثي الأبعاد في المنتصف -->
            <div class="logo-container">
                <div class="logo-text">
                    <div class="line1">SHA BABEK</div>
                    <div class="line2">شابابك</div>
                    <div class="line3">شاد و باغ</div>
                    <div class="line4">SHADE & ELEGANCE</div>
                </div>
            </div>

            <!-- الأيقونات ستتم إضافتها هنا عبر JavaScript -->
        </div>

        <!-- رابط إضافة جهة الاتصال (بدون QR code مكرر) -->
        <div class="contact-link">
            <a href="https://myqrcode.mobi/0148f3e2" target="_blank" class="contact-button">
                <i class="fas fa-qrcode"></i>
                <span>➕ اضف جهة اتصال</span>
                <i class="fas fa-phone-alt"></i>
            </a>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <div class="admin-header">
                <h2>⚙️ لوحة التحكم</h2>
                <button class="admin-close" onclick="closeAdmin()">✕</button>
            </div>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('icons')">🔘 الأيقونات</button>
            </div>
            <div class="admin-section">
                <h3>➕ إضافة أيقونة</h3>
                <input type="text" id="icon-class" class="admin-input" placeholder="اسم الأيقونة (fab fa-facebook)">
                <input type="text" id="icon-label" class="admin-input" placeholder="النص (فيسبوك)">
                <input type="url" id="icon-url" class="admin-input" placeholder="الرابط">
                <button class="admin-btn" onclick="addIcon()">➕ إضافة</button>
            </div>
            <div class="admin-section">
                <h3>📋 الأيقونات الحالية</h3>
                <div id="admin-icons-list" class="admin-list"></div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"><span id="notif-message"></span></div>

    <script>
        // قائمة الأيقونات
        let iconsData = [
            { icon: 'fas fa-store', label: 'المتجر', url: 'https://shababekcurtains.com/index.html?page=categories#homePage' },
            { icon: 'fab fa-whatsapp', label: 'واتساب', url: 'https://wa.me/9647883002797' },
            { icon: 'fab fa-instagram', label: 'إنستغرام', url: 'https://www.instagram.com/shababek.curtains/' },
            { icon: 'fab fa-facebook', label: 'فيسبوك', url: 'https://www.facebook.com/profile.php?id=61587692021311' },
            { icon: 'fab fa-tiktok', label: 'تيك توك', url: 'https://www.tiktok.com/@shababek.curtains' },
            { icon: 'fab fa-youtube', label: 'يوتيوب', url: 'https://youtube.com/@shababek.curtains' },
            { icon: 'fa-brands fa-x-twitter', label: 'تويتر', url: 'https://x.com/ShababekCurtain' },
            { icon: 'fab fa-snapchat', label: 'سناب', url: 'https://www.snapchat.com/add/shababekcurtin' },
            { icon: 'fab fa-telegram', label: 'تيليجرام', url: 'https://t.me/shababekcurtains' }
        ];

        let clickCount = 0;
        let clickTimer;

        // توزيع الأيقونات بشكل دائري حول الشعار
        function renderIcons() {
            const container = document.getElementById('centerWrapper');
            if (!container) return;

            // إزالة الأيقونات القديمة مع الاحتفاظ بالشعار
            const existingIcons = container.querySelectorAll('.icon-item');
            existingIcons.forEach(icon => icon.remove());

            iconsData.forEach((item, index) => {
                const iconElement = document.createElement('div');
                iconElement.className = 'icon-item';
                iconElement.style.setProperty('--icon-index', index);
                iconElement.setAttribute('onclick', `openIconLink('${item.url}'); handleIconClick(event, ${index}); return false;`);
                
                iconElement.innerHTML = `
                    <div class="icon-circle">
                        <i class="${item.icon}"></i>
                    </div>
                    <span class="icon-label">${item.label}</span>
                `;
                
                container.appendChild(iconElement);
            });
        }

        // فتح رابط الأيقونة
        function openIconLink(url) {
            showNotif('جاري الفتح...');
            window.location.href = url;
        }

        // نظام الـ 5 نقرات
        function handleIconClick(event, index) {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
            if (clickCount >= 5) {
                clickCount = 0;
                openAdminPanel();
            }
        }

        function openAdminPanel() {
            document.getElementById('adminPanel').classList.add('show');
            showAdminIcons();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('show');
        }

        function switchTab(tab) {
            showAdminIcons();
        }

        function showAdminIcons() {
            let list = document.getElementById('admin-icons-list');
            list.innerHTML = iconsData.map((item, index) => `
                <div class="admin-item">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="${item.icon}" style="color:#d9b382; font-size:16px;"></i>
                        <span style="font-size:12px;">${item.label}</span>
                    </div>
                    <div class="admin-item-actions">
                        <button class="admin-item-btn edit" onclick="editIcon(${index})">✏️</button>
                        <button class="admin-item-btn delete" onclick="deleteIcon(${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function addIcon() {
            let iconClass = document.getElementById('icon-class').value;
            let iconLabel = document.getElementById('icon-label').value;
            let iconUrl = document.getElementById('icon-url').value;
            if (!iconClass || !iconLabel || !iconUrl) { showNotif('أكمل البيانات'); return; }
            iconsData.push({ icon: iconClass, label: iconLabel, url: iconUrl });
            saveData(); renderIcons(); showAdminIcons();
            document.getElementById('icon-class').value = '';
            document.getElementById('icon-label').value = '';
            document.getElementById('icon-url').value = '';
            showNotif('✅ تمت الإضافة');
        }

        function editIcon(index) {
            let newLabel = prompt('النص الجديد:', iconsData[index].label);
            if (newLabel) iconsData[index].label = newLabel;
            let newUrl = prompt('الرابط الجديد:', iconsData[index].url);
            if (newUrl) iconsData[index].url = newUrl;
            saveData(); renderIcons(); showAdminIcons();
            showNotif('✅ تم التعديل');
        }

        function deleteIcon(index) {
            if (confirm('حذف الأيقونة؟')) {
                iconsData.splice(index, 1);
                saveData(); renderIcons(); showAdminIcons();
                showNotif('✅ تم الحذف');
            }
        }

        function saveData() {
            localStorage.setItem('shababek_icons_3d_orbiting', JSON.stringify(iconsData));
        }

        function loadData() {
            const saved = localStorage.getItem('shababek_icons_3d_orbiting');
            if (saved) iconsData = JSON.parse(saved);
            renderIcons();
        }

        function showNotif(msg) {
            let n = document.getElementById('notification');
            document.getElementById('notif-message').innerText = msg;
            n.style.display = 'flex';
            setTimeout(() => n.style.display = 'none', 1500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setTimeout(() => showNotif('👋 5 مرات على أي أيقونة'), 1000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبابيك للستائر - بطاقة التواصل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #f5efe8; /* خلفية بيج فاتح */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            width: 100%;
        }

        /* الصورة كعنصر منفصل (وليست خلفية) */
        .bg-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: -1;
        }

        .bg-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        /* للكمبيوتر - الصورة في المنتصف مع خلفية بيج */
        @media (min-width: 769px) {
            .bg-image {
                max-width: 1200px;
                width: 100%;
                height: auto;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        /* الحاوية الرئيسية للشعار والأيقونات */
        .center-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        /* الشعار كصورة في المنتصف */
        .logo-image {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            animation: logoFloat 4s infinite ease-in-out;
            border: 3px solid #d9b382;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        /* الأيقونات الدوارة حول الشعار */
        .icon-item {
            position: absolute;
            width: 70px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            z-index: 10;
            animation: orbitRotate 20s linear infinite;
            animation-delay: calc(var(--icon-index) * -2s);
        }

        @keyframes orbitRotate {
            0% { 
                transform: rotate(0deg) translateX(150px) rotate(0deg);
            }
            100% { 
                transform: rotate(360deg) translateX(150px) rotate(-360deg);
            }
        }

        .icon-item:hover {
            animation-play-state: paused;
            transform: scale(1.3) translateY(-5px) !important;
            filter: drop-shadow(0 15px 25px #d9b382);
            z-index: 30;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.7);
            margin-bottom: 4px;
            transition: all 0.4s ease;
            border: 2px solid #d9b382;
        }

        .icon-item:hover .icon-circle {
            background: #d9b382;
            transform: rotate(360deg);
            border-color: white;
        }

        .icon-item:hover .icon-circle i {
            color: #2b1e16 !important;
        }

        .icon-label {
            font-size: 10px;
            font-weight: 700;
            color: #2b1e16;
            text-align: center;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.9);
            white-space: nowrap;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #d9b382;
        }

        /* ألوان الأيقونات */
        .fa-store { color: #ffd700; }
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-facebook { color: #1877F2; }
        .fa-tiktok { color: #ffffff; }
        .fa-youtube { color: #FF0000; }
        .fa-x-twitter { color: #ffffff; }
        .fa-snapchat { color: #000000; }
        .fa-telegram { color: #0088cc; }

        .icon-item:hover .fa-store,
        .icon-item:hover .fa-whatsapp,
        .icon-item:hover .fa-instagram,
        .icon-item:hover .fa-facebook,
        .icon-item:hover .fa-tiktok,
        .icon-item:hover .fa-youtube,
        .icon-item:hover .fa-x-twitter,
        .icon-item:hover .fa-snapchat,
        .icon-item:hover .fa-telegram {
            color: #2b1e16 !important;
        }

        /* رابط إضافة جهة الاتصال */
        .contact-link {
            text-align: center;
            margin-top: 20px;
            animation: fadeInUp 0.6s ease 0.5s both;
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #d9b382;
            padding: 12px 30px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #2b1e16;
            border: 2px solid white;
        }

        .contact-button:hover {
            transform: scale(1.05);
            background: #b58f5a;
            color: white;
            box-shadow: 0 15px 35px rgba(217,179,130,0.4);
        }

        .contact-button i {
            font-size: 20px;
            color: #2b1e16;
        }

        .contact-button:hover i {
            color: white;
        }

        .contact-button span {
            font-size: 16px;
            font-weight: 700;
        }

        .contact-button .fa-phone-alt {
            animation: ring 2s infinite;
        }

        @keyframes ring {
            0%, 100% { transform: rotate(0); }
            20% { transform: rotate(15deg); }
            40% { transform: rotate(-15deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* للهاتف - تعديلات بسيطة */
        @media (max-width: 768px) {
            .center-wrapper {
                width: 320px;
                height: 320px;
            }
            
            .logo-image {
                width: 120px;
                height: 120px;
            }
            
            @keyframes orbitRotate {
                0% { transform: rotate(0deg) translateX(120px) rotate(0deg); }
                100% { transform: rotate(360deg) translateX(120px) rotate(-360deg); }
            }
            
            .icon-item {
                width: 60px;
                height: 60px;
            }
            
            .icon-circle {
                width: 45px;
                height: 45px;
                font-size: 22px;
            }
            
            .contact-button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        /* لوحة التحكم */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .admin-panel.show { display: flex; }

        .admin-content {
            background: white;
            width: 100%;
            max-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #d9b382;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #d9b382;
        }

        .admin-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
        }

        .admin-tabs {
            display: flex;
            gap: 3px;
            margin-bottom: 10px;
        }

        .admin-tab {
            flex: 1;
            padding: 6px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .admin-tab.active { background: #d9b382; color: white; }

        .admin-section {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .admin-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 6px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 12px;
        }

        .admin-btn {
            padding: 8px;
            font-size: 13px;
        }

        .admin-list {
            max-height: 180px;
        }

        .admin-item {
            padding: 6px;
        }

        .admin-item-btn {
            width: 28px;
            height: 28px;
            font-size: 11px;
        }

        .notification {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #2b1e16;
            padding: 6px 15px;
            border-radius: 30px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3), 0 0 0 2px #d9b382;
            display: none;
            z-index: 3000;
            font-size: 11px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <!-- الصورة كخلفية مرئية (وليست خلفية css) -->
    <div class="bg-image-container">
        <img src="https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772594834/%D8%AA%D8%B5%D9%85%D9%8A%D9%85_%D8%A8%D8%AF%D9%88%D9%86_%D8%B9%D9%86%D9%88%D8%A7%D9%86_1_kmg4fd.png" alt="خلفية" class="bg-image">
    </div>

    <div class="container">
        <!-- الحاوية التي تضم الشعار والأيقونات -->
        <div class="center-wrapper" id="centerWrapper">
            <!-- الشعار كصورة في المنتصف -->
            <img src="https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772592833/shababek_logo.png" alt="شعار شبابيك" class="logo-image">

            <!-- الأيقونات ستتم إضافتها هنا عبر JavaScript -->
        </div>

        <!-- رابط إضافة جهة الاتصال -->
        <div class="contact-link">
            <a href="https://myqrcode.mobi/0148f3e2" target="_blank" class="contact-button">
                <i class="fas fa-qrcode"></i>
                <span>➕ اضف جهة اتصال</span>
                <i class="fas fa-phone-alt"></i>
            </a>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <div class="admin-header">
                <h2>⚙️ لوحة التحكم</h2>
                <button class="admin-close" onclick="closeAdmin()">✕</button>
            </div>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('icons')">🔘 الأيقونات</button>
            </div>
            <div class="admin-section">
                <h3>➕ إضافة أيقونة</h3>
                <input type="text" id="icon-class" class="admin-input" placeholder="اسم الأيقونة (fab fa-facebook)">
                <input type="text" id="icon-label" class="admin-input" placeholder="النص (فيسبوك)">
                <input type="url" id="icon-url" class="admin-input" placeholder="الرابط">
                <button class="admin-btn" onclick="addIcon()">➕ إضافة</button>
            </div>
            <div class="admin-section">
                <h3>📋 الأيقونات الحالية</h3>
                <div id="admin-icons-list" class="admin-list"></div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"><span id="notif-message"></span></div>

    <script>
        // قائمة الأيقونات
        let iconsData = [
            { icon: 'fas fa-store', label: 'المتجر', url: 'https://shababekcurtains.com/index.html?page=categories#homePage' },
            { icon: 'fab fa-whatsapp', label: 'واتساب', url: 'https://wa.me/9647883002797' },
            { icon: 'fab fa-instagram', label: 'إنستغرام', url: 'https://www.instagram.com/shababek.curtains/' },
            { icon: 'fab fa-facebook', label: 'فيسبوك', url: 'https://www.facebook.com/profile.php?id=61587692021311' },
            { icon: 'fab fa-tiktok', label: 'تيك توك', url: 'https://www.tiktok.com/@shababek.curtains' },
            { icon: 'fab fa-youtube', label: 'يوتيوب', url: 'https://youtube.com/@shababek.curtains' },
            { icon: 'fa-brands fa-x-twitter', label: 'تويتر', url: 'https://x.com/ShababekCurtain' },
            { icon: 'fab fa-snapchat', label: 'سناب', url: 'https://www.snapchat.com/add/shababekcurtin' },
            { icon: 'fab fa-telegram', label: 'تيليجرام', url: 'https://t.me/shababekcurtains' }
        ];

        let clickCount = 0;
        let clickTimer;

        // توزيع الأيقونات بشكل دائري حول الشعار
        function renderIcons() {
            const container = document.getElementById('centerWrapper');
            if (!container) return;

            // إزالة الأيقونات القديمة مع الاحتفاظ بالشعار
            const existingIcons = container.querySelectorAll('.icon-item');
            existingIcons.forEach(icon => icon.remove());

            iconsData.forEach((item, index) => {
                const iconElement = document.createElement('div');
                iconElement.className = 'icon-item';
                iconElement.style.setProperty('--icon-index', index);
                iconElement.setAttribute('onclick', `openIconLink('${item.url}'); handleIconClick(event, ${index}); return false;`);
                
                iconElement.innerHTML = `
                    <div class="icon-circle">
                        <i class="${item.icon}"></i>
                    </div>
                    <span class="icon-label">${item.label}</span>
                `;
                
                container.appendChild(iconElement);
            });
        }

        // فتح رابط الأيقونة
        function openIconLink(url) {
            showNotif('جاري الفتح...');
            window.location.href = url;
        }

        // نظام الـ 5 نقرات
        function handleIconClick(event, index) {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
            if (clickCount >= 5) {
                clickCount = 0;
                openAdminPanel();
            }
        }

        function openAdminPanel() {
            document.getElementById('adminPanel').classList.add('show');
            showAdminIcons();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('show');
        }

        function switchTab(tab) {
            showAdminIcons();
        }

        function showAdminIcons() {
            let list = document.getElementById('admin-icons-list');
            list.innerHTML = iconsData.map((item, index) => `
                <div class="admin-item">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="${item.icon}" style="color:#d9b382; font-size:16px;"></i>
                        <span style="font-size:12px;">${item.label}</span>
                    </div>
                    <div class="admin-item-actions">
                        <button class="admin-item-btn edit" onclick="editIcon(${index})">✏️</button>
                        <button class="admin-item-btn delete" onclick="deleteIcon(${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function addIcon() {
            let iconClass = document.getElementById('icon-class').value;
            let iconLabel = document.getElementById('icon-label').value;
            let iconUrl = document.getElementById('icon-url').value;
            if (!iconClass || !iconLabel || !iconUrl) { showNotif('أكمل البيانات'); return; }
            iconsData.push({ icon: iconClass, label: iconLabel, url: iconUrl });
            saveData(); renderIcons(); showAdminIcons();
            document.getElementById('icon-class').value = '';
            document.getElementById('icon-label').value = '';
            document.getElementById('icon-url').value = '';
            showNotif('✅ تمت الإضافة');
        }

        function editIcon(index) {
            let newLabel = prompt('النص الجديد:', iconsData[index].label);
            if (newLabel) iconsData[index].label = newLabel;
            let newUrl = prompt('الرابط الجديد:', iconsData[index].url);
            if (newUrl) iconsData[index].url = newUrl;
            saveData(); renderIcons(); showAdminIcons();
            showNotif('✅ تم التعديل');
        }

        function deleteIcon(index) {
            if (confirm('حذف الأيقونة؟')) {
                iconsData.splice(index, 1);
                saveData(); renderIcons(); showAdminIcons();
                showNotif('✅ تم الحذف');
            }
        }

        function saveData() {
            localStorage.setItem('shababek_icons_final_desktop', JSON.stringify(iconsData));
        }

        function loadData() {
            const saved = localStorage.getItem('shababek_icons_final_desktop');
            if (saved) iconsData = JSON.parse(saved);
            renderIcons();
        }

        function showNotif(msg) {
            let n = document.getElementById('notification');
            document.getElementById('notif-message').innerText = msg;
            n.style.display = 'flex';
            setTimeout(() => n.style.display = 'none', 1500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setTimeout(() => showNotif('👋 5 مرات على أي أيقونة'), 1000);
        });
    </script>
</body>
</html>

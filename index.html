<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shababek Premium Orbit</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    min-height:100vh;
    background:radial-gradient(circle at center,#f8f1e8 0%,#e8dccb 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* الحاوية الرئيسية */
.wrapper{
    position:relative;
    width:380px;
    height:380px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:-50px; /* رفع للأعلى */
}

/* الشعار ثابت */
.logo-image{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #d9b382;
    box-shadow:
        0 0 0 6px rgba(217,179,130,.15),
        0 20px 40px rgba(0,0,0,.25);
    z-index:20;
}

/* المدار */
.orbit{
    position:absolute;
    width:100%;
    height:100%;
    animation:rotateOrbit 30s linear infinite;
}

.orbit.slowing{
    animation:rotateOrbit 3s ease-out forwards;
}

.orbit.paused{
    animation-play-state:paused;
}

@keyframes rotateOrbit{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

/* الأيقونات */
.icon-item{
    position:absolute;
    width:55px;
    height:55px;
    top:50%;
    left:50%;
    transform-origin:center;
}

.icon-circle{
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    background:rgba(0,0,0,.85);
    border:2px solid #d9b382;
    box-shadow:0 8px 18px rgba(0,0,0,.35);
    transition:.4s;
}

.icon-item.active .icon-circle{
    box-shadow:
        0 0 15px #d9b382,
        0 0 30px rgba(217,179,130,.6);
    transform:scale(1.15);
}

/* ألوان الأيقونات */
.fa-store{color:#ffd700;}
.fa-whatsapp{color:#25D366;}
.fa-instagram{color:#E4405F;}
.fa-facebook{color:#1877F2;}
.fa-tiktok{color:#ffffff;}
.fa-youtube{color:#FF0000;}
.fa-x-twitter{color:#ffffff;}
.fa-snapchat{color:#FFFC00;}
.fa-telegram{color:#0088cc;}

/* زر جهة الاتصال */
.contact-link{
    text-align:center;
    margin-top:90px; /* نزول للأسفل */
}

.contact-button{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:#d9b382;
    padding:14px 32px;
    border-radius:50px;
    text-decoration:none;
    color:#2b1e16;
    font-weight:bold;
    border:2px solid white;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    transition:.3s;
}

.contact-button:hover{
    transform:scale(1.07);
    background:#b58f5a;
    color:white;
}

/* موبايل */
@media(max-width:768px){
.wrapper{width:320px;height:320px;margin-top:-40px}
.logo-image{width:110px;height:110px}
.contact-link{margin-top:70px}
}
</style>
</head>
<body>

<div class="wrapper">
    <img src="https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772592833/shababek_logo.png" class="logo-image">
    <div class="orbit" id="orbit"></div>
</div>

<div class="contact-link">
    <a href="https://myqrcode.mobi/0148f3e2" target="_blank" class="contact-button">
        ➕ اضف جهة اتصال
    </a>
</div>

<script>

let iconsData=[
{icon:'fas fa-store',url:'#'},
{icon:'fab fa-whatsapp',url:'#'},
{icon:'fab fa-instagram',url:'#'},
{icon:'fab fa-facebook',url:'#'},
{icon:'fab fa-tiktok',url:'#'},
{icon:'fab fa-youtube',url:'#'},
{icon:'fa-brands fa-x-twitter',url:'#'},
{icon:'fab fa-snapchat',url:'#'},
{icon:'fab fa-telegram',url:'#'}
];

function renderIcons(){
    const orbit=document.getElementById('orbit');
    orbit.innerHTML='';
    const total=iconsData.length;
    const radius=105;

    iconsData.forEach((item,index)=>{
        const angle=(index/total)*(2*Math.PI);
        const x=radius*Math.cos(angle);
        const y=radius*Math.sin(angle);

        const icon=document.createElement('a');
        icon.className='icon-item';
        icon.href=item.url;

        icon.style.transform=`
        translate(-50%,-50%)
        translate(${x}px,${y}px)
        `;

        icon.innerHTML=`
        <div class="icon-circle">
            <i class="${item.icon}"></i>
        </div>
        `;

        icon.addEventListener('click',()=>{
            document.querySelectorAll('.icon-item').forEach(i=>i.classList.remove('active'));
            icon.classList.add('active');
            orbit.classList.add('slowing');
            setTimeout(()=>{
                orbit.classList.add('paused');
            },2800);
        });

        orbit.appendChild(icon);
    });
}

renderIcons();

</script>

</body>
</html>

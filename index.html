<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبابيك للستائر - بطاقة التواصل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #2b1e16;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* خلفية متدرجة أنيقة */
        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #d9b38230, #2b1e16 80%);
            z-index: -1;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        /* الحاوية الرئيسية للشعار والأيقونات */
        .center-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* الشعار في المنتصف */
        .logo-container {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(145deg, #d9b382, #b58f5a);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 0 4px #d9b38280;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            animation: logoGlow 3s infinite ease-in-out;
        }

        @keyframes logoGlow {
            0%, 100% { 
                box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 0 4px #d9b38280;
                transform: translate(-50%, -50%) scale(1);
            }
            50% { 
                box-shadow: 0 20px 45px rgba(217,179,130,0.5), 0 0 0 6px #d9b382;
                transform: translate(-50%, -50%) scale(1.02);
            }
        }

        .logo-text {
            text-align: center;
            color: #2b1e16;
        }

        .logo-text .line1 {
            font-size: 24px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 2px;
        }

        .logo-text .line2 {
            font-size: 18px;
            font-weight: 800;
            margin: 2px 0;
        }

        .logo-text .line3 {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .logo-text .line4 {
            font-size: 10px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* الأيقونات الدوارة حول الشعار */
        .icon-item {
            position: absolute;
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatIcon 3s infinite ease-in-out;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.5));
            z-index: 10;
        }

        /* تأخير مختلف لكل أيقونة في الحركة */
        .icon-item:nth-child(1) { animation-delay: 0s; }
        .icon-item:nth-child(2) { animation-delay: 0.2s; }
        .icon-item:nth-child(3) { animation-delay: 0.4s; }
        .icon-item:nth-child(4) { animation-delay: 0.6s; }
        .icon-item:nth-child(5) { animation-delay: 0.8s; }
        .icon-item:nth-child(6) { animation-delay: 1s; }
        .icon-item:nth-child(7) { animation-delay: 1.2s; }
        .icon-item:nth-child(8) { animation-delay: 1.4s; }
        .icon-item:nth-child(9) { animation-delay: 1.6s; }

        @keyframes floatIcon {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-8px); }
        }

        .icon-item:hover {
            transform: translate(-50%, -50%) scale(1.2) !important;
            filter: drop-shadow(0 15px 25px #d9b382);
            z-index: 30;
            animation-play-state: paused;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid rgba(217,179,130,0.7);
            margin-bottom: 4px;
            transition: all 0.4s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .icon-item:hover .icon-circle {
            background: rgba(217,179,130,0.3);
            border-color: #d9b382;
            transform: rotate(360deg);
            box-shadow: 0 0 30px #d9b382;
        }

        .icon-label {
            font-size: 9px;
            font-weight: 700;
            color: white;
            text-align: center;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            white-space: nowrap;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(217,179,130,0.4);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* ألوان الأيقونات */
        .fa-store { color: #ffd700; }
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-facebook { color: #1877F2; }
        .fa-tiktok { color: #ffffff; }
        .fa-youtube { color: #FF0000; }
        .fa-x-twitter { color: #ffffff; }
        .fa-snapchat { color: #FFFC00; }
        .fa-telegram { color: #0088cc; }

        /* QR code في الأسفل */
        .qr-section {
            text-align: center;
            animation: fadeInUp 0.6s ease 0.5s both;
        }

        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .qr-box {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 20px;
            padding: 5px;
            border: 3px solid #d9b382;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .qr-box:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(217,179,130,0.4);
        }

        .qr-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        .qr-text {
            color: white;
            font-size: 13px;
            font-weight: 700;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            padding: 6px 20px;
            border-radius: 40px;
            border: 1px solid #d9b382;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qr-text i {
            color: #d9b382;
            font-size: 16px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* لوحة التحكم */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .admin-panel.show { display: flex; }

        .admin-content {
            background: white;
            width: 100%;
            max-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #d9b382;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #d9b382;
        }

        .admin-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
        }

        .admin-tabs {
            display: flex;
            gap: 3px;
            margin-bottom: 10px;
        }

        .admin-tab {
            flex: 1;
            padding: 6px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .admin-tab.active { background: #d9b382; color: white; }

        .admin-section {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .admin-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 6px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 12px;
        }

        .admin-btn {
            padding: 8px;
            font-size: 13px;
        }

        .admin-list {
            max-height: 180px;
        }

        .admin-item {
            padding: 6px;
        }

        .admin-item-btn {
            width: 28px;
            height: 28px;
            font-size: 11px;
        }

        .notification {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #2b1e16;
            padding: 6px 15px;
            border-radius: 30px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3), 0 0 0 2px #d9b382;
            display: none;
            z-index: 3000;
            font-size: 11px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="container">
        <!-- الحاوية التي تضم الشعار والأيقونات -->
        <div class="center-wrapper" id="centerWrapper">
            <!-- الشعار في المنتصف -->
            <div class="logo-container">
                <div class="logo-text">
                    <div class="line1">SHA BABEK</div>
                    <div class="line2">شابابك</div>
                    <div class="line3">شاد و باغ</div>
                    <div class="line4">SHADE & ELEGANCE</div>
                </div>
            </div>

            <!-- الأيقونات ستتم إضافتها هنا عبر JavaScript -->
        </div>

        <!-- QR code في الأسفل -->
        <div class="qr-section">
            <div class="qr-container">
                <div class="qr-box" onclick="openQRCode()">
                    <img src="https://myqrcode.mobi/0148f3e2/qr.svg" alt="QR Code">
                </div>
                <div class="qr-text">
                    <i class="fas fa-qrcode"></i>
                    <span>➕ اضغط لإضافة جهات الاتصال</span>
                    <i class="fas fa-phone-alt"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <div class="admin-header">
                <h2>⚙️ لوحة التحكم</h2>
                <button class="admin-close" onclick="closeAdmin()">✕</button>
            </div>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('icons')">🔘 الأيقونات</button>
            </div>
            <div class="admin-section">
                <h3>➕ إضافة أيقونة</h3>
                <input type="text" id="icon-class" class="admin-input" placeholder="اسم الأيقونة (fab fa-facebook)">
                <input type="text" id="icon-label" class="admin-input" placeholder="النص (فيسبوك)">
                <input type="url" id="icon-url" class="admin-input" placeholder="الرابط">
                <button class="admin-btn" onclick="addIcon()">➕ إضافة</button>
            </div>
            <div class="admin-section">
                <h3>📋 الأيقونات الحالية</h3>
                <div id="admin-icons-list" class="admin-list"></div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"><span id="notif-message"></span></div>

    <script>
        // قائمة الأيقونات
        let iconsData = [
            { icon: 'fas fa-store', label: 'المتجر', url: 'https://shababekcurtains.com/index.html?page=categories#homePage' },
            { icon: 'fab fa-whatsapp', label: 'واتساب', url: 'https://wa.me/9647883002797' },
            { icon: 'fab fa-instagram', label: 'إنستغرام', url: 'https://www.instagram.com/shababek.curtains/' },
            { icon: 'fab fa-facebook', label: 'فيسبوك', url: 'https://www.facebook.com/profile.php?id=61587692021311' },
            { icon: 'fab fa-tiktok', label: 'تيك توك', url: 'https://www.tiktok.com/@shababek.curtains' },
            { icon: 'fab fa-youtube', label: 'يوتيوب', url: 'https://youtube.com/@shababek.curtains' },
            { icon: 'fa-brands fa-x-twitter', label: 'تويتر', url: 'https://x.com/ShababekCurtain' },
            { icon: 'fab fa-snapchat', label: 'سناب', url: 'https://www.snapchat.com/add/shababekcurtin' },
            { icon: 'fab fa-telegram', label: 'تيليجرام', url: 'https://t.me/shababekcurtains' }
        ];

        let clickCount = 0;
        let clickTimer;

        // توزيع الأيقونات بشكل دائري حول الشعار
        function renderIcons() {
            const container = document.getElementById('centerWrapper');
            if (!container) return;

            // إزالة الأيقونات القديمة مع الاحتفاظ بالشعار
            const existingIcons = container.querySelectorAll('.icon-item');
            existingIcons.forEach(icon => icon.remove());

            const radius = 130; // نصف قطر الدائرة
            const centerX = 160; // مركز الدائرة (نصف عرض centerWrapper)
            const centerY = 160;

            iconsData.forEach((item, index) => {
                // حساب زاوية كل أيقونة (توزيع متساوي)
                const angle = (index * 40) - 90; // 40 درجة بين كل أيقونة
                const x = centerX + radius * Math.cos(angle * Math.PI / 180);
                const y = centerY + radius * Math.sin(angle * Math.PI / 180);
                
                const iconElement = document.createElement('div');
                iconElement.className = 'icon-item';
                iconElement.style.left = `${x}px`;
                iconElement.style.top = `${y}px`;
                iconElement.setAttribute('onclick', `openIconLink('${item.url}'); handleIconClick(event, ${index}); return false;`);
                
                iconElement.innerHTML = `
                    <div class="icon-circle">
                        <i class="${item.icon}"></i>
                    </div>
                    <span class="icon-label">${item.label}</span>
                `;
                
                container.appendChild(iconElement);
            });
        }

        // فتح رابط QR code
        function openQRCode() {
            window.open('https://myqrcode.mobi/0148f3e2', '_blank');
            showNotif('جاري فتح جهات الاتصال...');
        }

        // فتح رابط الأيقونة
        function openIconLink(url) {
            showNotif('جاري الفتح...');
            window.location.href = url;
        }

        // نظام الـ 5 نقرات
        function handleIconClick(event, index) {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
            if (clickCount >= 5) {
                clickCount = 0;
                openAdminPanel();
            }
        }

        function openAdminPanel() {
            document.getElementById('adminPanel').classList.add('show');
            showAdminIcons();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('show');
        }

        function switchTab(tab) {
            showAdminIcons();
        }

        function showAdminIcons() {
            let list = document.getElementById('admin-icons-list');
            list.innerHTML = iconsData.map((item, index) => `
                <div class="admin-item">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="${item.icon}" style="color:#d9b382; font-size:16px;"></i>
                        <span style="font-size:12px;">${item.label}</span>
                    </div>
                    <div class="admin-item-actions">
                        <button class="admin-item-btn edit" onclick="editIcon(${index})">✏️</button>
                        <button class="admin-item-btn delete" onclick="deleteIcon(${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function addIcon() {
            let iconClass = document.getElementById('icon-class').value;
            let iconLabel = document.getElementById('icon-label').value;
            let iconUrl = document.getElementById('icon-url').value;
            if (!iconClass || !iconLabel || !iconUrl) { showNotif('أكمل البيانات'); return; }
            iconsData.push({ icon: iconClass, label: iconLabel, url: iconUrl });
            saveData(); renderIcons(); showAdminIcons();
            document.getElementById('icon-class').value = '';
            document.getElementById('icon-label').value = '';
            document.getElementById('icon-url').value = '';
            showNotif('✅ تمت الإضافة');
        }

        function editIcon(index) {
            let newLabel = prompt('النص الجديد:', iconsData[index].label);
            if (newLabel) iconsData[index].label = newLabel;
            let newUrl = prompt('الرابط الجديد:', iconsData[index].url);
            if (newUrl) iconsData[index].url = newUrl;
            saveData(); renderIcons(); showAdminIcons();
            showNotif('✅ تم التعديل');
        }

        function deleteIcon(index) {
            if (confirm('حذف الأيقونة؟')) {
                iconsData.splice(index, 1);
                saveData(); renderIcons(); showAdminIcons();
                showNotif('✅ تم الحذف');
            }
        }

        function saveData() {
            localStorage.setItem('shababek_icons_rotating', JSON.stringify(iconsData));
        }

        function loadData() {
            const saved = localStorage.getItem('shababek_icons_rotating');
            if (saved) iconsData = JSON.parse(saved);
            renderIcons();
        }

        function showNotif(msg) {
            let n = document.getElementById('notification');
            document.getElementById('notif-message').innerText = msg;
            n.style.display = 'flex';
            setTimeout(() => n.style.display = 'none', 1500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setTimeout(() => showNotif('👋 5 مرات على أي أيقونة'), 1000);
        });
    </script>
</body>
</html>

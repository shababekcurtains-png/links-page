<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبابيك للستائر - أيقونات سريعة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #2b1e16;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* الصورة كخلفية */
        .custom-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772594834/%D8%AA%D8%B5%D9%85%D9%8A%D9%85_%D8%A8%D8%AF%D9%88%D9%86_%D8%B9%D9%86%D9%88%D8%A7%D9%86_1_kmg4fd.png') no-repeat center center;
            background-size: contain;
            background-color: #2b1e16;
            z-index: -1;
        }

        @media (min-width: 769px) {
            .custom-bg {
                background-size: auto 100%;
                background-position: center center;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 5px 15px 0;
        }

        .top-spacer {
            height: 16vh;
            width: 100%;
        }

        /* شبكة 3×3 */
        .icons-grid {
            width: 100%;
            max-width: 280px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px 10px;
            padding: 0;
        }

        /* أيقونة بدون خلفية */
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            padding: 5px 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .icon-item:nth-child(1) { animation-delay: 0.02s; }
        .icon-item:nth-child(2) { animation-delay: 0.04s; }
        .icon-item:nth-child(3) { animation-delay: 0.06s; }
        .icon-item:nth-child(4) { animation-delay: 0.08s; }
        .icon-item:nth-child(5) { animation-delay: 0.1s; }
        .icon-item:nth-child(6) { animation-delay: 0.12s; }
        .icon-item:nth-child(7) { animation-delay: 0.14s; }
        .icon-item:nth-child(8) { animation-delay: 0.16s; }
        .icon-item:nth-child(9) { animation-delay: 0.18s; }

        .icon-item:active {
            transform: scale(0.95);
        }

        /* أيقونة بدون خلفية - شفافة تماماً */
        .icon-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px; /* أيقونات أكبر */
            color: white;
            background: transparent; /* شفافة تماماً */
            margin-bottom: 8px;
            transition: all 0.3s ease;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
        }

        /* تأثير تفاعلي بسيط */
        .icon-item:hover .icon-circle,
        .icon-item:active .icon-circle {
            transform: scale(1.15);
            text-shadow: 0 0 20px #d9b382, 0 0 40px rgba(217, 179, 130, 0.5);
        }

        /* عنوان الأيقونة مع تضليل فقط */
        .icon-label {
            font-size: 11px;
            font-weight: 800;
            color: white;
            text-align: center;
            padding: 4px 12px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.5); /* تضليل للعنوان فقط */
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            max-width: 75px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(217, 179, 130, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .icon-item:hover .icon-label,
        .icon-item:active .icon-label {
            background: rgba(217, 179, 130, 0.3);
            border-color: #d9b382;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(217, 179, 130, 0.3);
        }

        /* ألوان الأيقونات - أكثر إشراقاً */
        .fa-store { color: #ffd700; }
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-facebook { color: #1877F2; }
        .fa-tiktok { color: #ffffff; }
        .fa-youtube { color: #FF0000; }
        .fa-x-twitter { color: #ffffff; }
        .fa-snapchat { color: #FFFC00; }
        .fa-telegram { color: #0088cc; }

        /* تأثيرات إضافية عند hover */
        .icon-item:hover .fa-store {
            filter: drop-shadow(0 0 10px #ffd700);
        }
        .icon-item:hover .fa-whatsapp {
            filter: drop-shadow(0 0 10px #25D366);
        }
        .icon-item:hover .fa-instagram {
            filter: drop-shadow(0 0 10px #E4405F);
        }
        .icon-item:hover .fa-facebook {
            filter: drop-shadow(0 0 10px #1877F2);
        }
        .icon-item:hover .fa-tiktok {
            filter: drop-shadow(0 0 10px #ffffff);
        }
        .icon-item:hover .fa-youtube {
            filter: drop-shadow(0 0 10px #FF0000);
        }
        .icon-item:hover .fa-x-twitter {
            filter: drop-shadow(0 0 10px #ffffff);
        }
        .icon-item:hover .fa-snapchat {
            filter: drop-shadow(0 0 10px #FFFC00);
        }
        .icon-item:hover .fa-telegram {
            filter: drop-shadow(0 0 10px #0088cc);
        }

        .bottom-spacer {
            flex: 1;
            width: 100%;
        }

        /* ===== لوحة التحكم ===== */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-y: auto;
        }

        .admin-panel.show { display: flex; }

        .admin-content {
            background: white;
            width: 100%;
            max-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #d9b382;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #d9b382;
        }

        .admin-header h2 { font-size: 16px; }

        .admin-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
        }

        .admin-tabs {
            display: flex;
            gap: 3px;
            margin-bottom: 10px;
        }

        .admin-tab {
            flex: 1;
            padding: 6px;
            font-size: 11px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .admin-tab.active { background: #d9b382; color: white; }

        .admin-section {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .admin-section h3 { font-size: 13px; margin-bottom: 8px; }

        .admin-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 6px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 12px;
        }

        .admin-btn {
            padding: 8px;
            font-size: 13px;
        }

        .admin-list {
            max-height: 180px;
        }

        .admin-item {
            padding: 6px;
        }

        .admin-item-btn {
            width: 28px;
            height: 28px;
            font-size: 11px;
        }

        .notification {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #3d2e24;
            padding: 6px 15px;
            border-radius: 30px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3), 0 0 0 2px #d9b382;
            display: none;
            align-items: center;
            gap: 5px;
            z-index: 3000;
            font-size: 11px;
            white-space: nowrap;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="custom-bg"></div>

    <div class="container">
        <div class="top-spacer"></div>
        <div class="icons-grid" id="iconsGrid"></div>
        <div class="bottom-spacer"></div>
    </div>

    <!-- لوحة التحكم -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <div class="admin-header">
                <h2>⚙️ لوحة التحكم</h2>
                <button class="admin-close" onclick="closeAdmin()">✕</button>
            </div>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('icons')">🔘 الأيقونات</button>
            </div>
            <div class="admin-section">
                <h3>➕ إضافة أيقونة</h3>
                <input type="text" id="icon-class" class="admin-input" placeholder="اسم الأيقونة (fab fa-facebook)">
                <input type="text" id="icon-label" class="admin-input" placeholder="النص (فيسبوك)">
                <input type="url" id="icon-url" class="admin-input" placeholder="الرابط">
                <button class="admin-btn" onclick="addIcon()">➕ إضافة</button>
            </div>
            <div class="admin-section">
                <h3>📋 الأيقونات الحالية</h3>
                <div id="admin-icons-list" class="admin-list"></div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"><i class="fas fa-check-circle"></i><span id="notif-message"></span></div>

    <script>
        let iconsData = [
            { icon: 'fas fa-store', label: 'المتجر', url: 'https://shababekcurtains.com/index.html?page=categories#homePage' },
            { icon: 'fab fa-whatsapp', label: 'واتساب', url: 'https://wa.me/9647883002797' },
            { icon: 'fab fa-instagram', label: 'إنستغرام', url: 'https://www.instagram.com/shababek.curtains/' },
            { icon: 'fab fa-facebook', label: 'فيسبوك', url: 'https://www.facebook.com/profile.php?id=61587692021311' },
            { icon: 'fab fa-tiktok', label: 'تيك توك', url: 'https://www.tiktok.com/@shababek.curtains' },
            { icon: 'fab fa-youtube', label: 'يوتيوب', url: 'https://youtube.com/@shababek.curtains' },
            { icon: 'fa-brands fa-x-twitter', label: 'تويتر', url: 'https://x.com/ShababekCurtain' },
            { icon: 'fab fa-snapchat', label: 'سناب', url: 'https://www.snapchat.com/add/shababekcurtin' },
            { icon: 'fab fa-telegram', label: 'تيليجرام', url: 'https://t.me/shababekcurtains' }
        ];

        let clickCount = 0;
        let clickTimer;

        function loadData() {
            const saved = localStorage.getItem('shababek_icons_transparent');
            if (saved) iconsData = JSON.parse(saved);
            renderIcons();
        }

        function saveData() {
            localStorage.setItem('shababek_icons_transparent', JSON.stringify(iconsData));
        }

        function renderIcons() {
            const container = document.getElementById('iconsGrid');
            if (!container) return;

            let html = '';
            iconsData.forEach((item, index) => {
                html += `
                    <div class="icon-item" onclick="openIconLink('${item.url}'); handleIconClick(event, ${index}); return false;">
                        <div class="icon-circle">
                            <i class="${item.icon}"></i>
                        </div>
                        <span class="icon-label">${item.label}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function openIconLink(url) {
            showNotif('جاري الفتح...');
            window.location.href = url;
        }

        function handleIconClick(event, index) {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
            if (clickCount >= 5) {
                clickCount = 0;
                openAdminPanel();
            }
        }

        function openAdminPanel() {
            document.getElementById('adminPanel').classList.add('show');
            showAdminIcons();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('show');
        }

        function switchTab(tab) {
            showAdminIcons();
        }

        function showAdminIcons() {
            let list = document.getElementById('admin-icons-list');
            list.innerHTML = iconsData.map((item, index) => `
                <div class="admin-item">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="${item.icon}" style="color:#d9b382; font-size:16px;"></i>
                        <span style="font-size:12px;">${item.label}</span>
                    </div>
                    <div class="admin-item-actions">
                        <button class="admin-item-btn edit" onclick="editIcon(${index})">✏️</button>
                        <button class="admin-item-btn delete" onclick="deleteIcon(${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function addIcon() {
            let iconClass = document.getElementById('icon-class').value;
            let iconLabel = document.getElementById('icon-label').value;
            let iconUrl = document.getElementById('icon-url').value;
            if (!iconClass || !iconLabel || !iconUrl) { showNotif('أكمل البيانات'); return; }
            iconsData.push({ icon: iconClass, label: iconLabel, url: iconUrl });
            saveData(); renderIcons(); showAdminIcons();
            document.getElementById('icon-class').value = '';
            document.getElementById('icon-label').value = '';
            document.getElementById('icon-url').value = '';
            showNotif('✅ تمت الإضافة');
        }

        function editIcon(index) {
            let newLabel = prompt('النص الجديد:', iconsData[index].label);
            if (newLabel) iconsData[index].label = newLabel;
            let newUrl = prompt('الرابط الجديد:', iconsData[index].url);
            if (newUrl) iconsData[index].url = newUrl;
            saveData(); renderIcons(); showAdminIcons();
            showNotif('✅ تم التعديل');
        }

        function deleteIcon(index) {
            if (confirm('حذف الأيقونة؟')) {
                iconsData.splice(index, 1);
                saveData(); renderIcons(); showAdminIcons();
                showNotif('✅ تم الحذف');
            }
        }

        function showNotif(msg) {
            let n = document.getElementById('notification');
            document.getElementById('notif-message').innerText = msg;
            n.style.display = 'flex';
            setTimeout(() => n.style.display = 'none', 800);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setTimeout(() => showNotif('👋 5 مرات على أي أيقونة'), 1000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shababek QR Card</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f4f4f4;
    font-family:Arial, sans-serif;
}

.card{
    position:relative;
    width:400px;
    height:700px;
    background:url('background.jpg') no-repeat center center;
    background-size:cover;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* الشعار */
.logo{
    position:absolute;
    top:70px;
    left:50%;
    transform:translateX(-50%);
    width:130px;
    z-index:2;
}

/* دائرة الأيقونات */
.icons-circle{
    position:absolute;
    top:200px;
    left:50%;
    width:200px;
    height:200px;
    transform:translateX(-50%);
    animation:rotate 20s linear infinite;
}

/* حركة دوران فقط */
@keyframes rotate{
    from{ transform:translateX(-50%) rotate(0deg); }
    to{ transform:translateX(-50%) rotate(360deg); }
}

.icons-circle a{
    position:absolute;
    font-size:28px;
    width:50px;
    height:50px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    background:#fff;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    text-decoration:none;
}

/* توزيع الأيقونات حول الدائرة */
.icons-circle a:nth-child(1){ top:0; left:50%; transform:translate(-50%,-50%); color:#E1306C;}
.icons-circle a:nth-child(2){ top:50%; right:0; transform:translate(50%,-50%); color:#25D366;}
.icons-circle a:nth-child(3){ bottom:0; left:50%; transform:translate(-50%,50%); color:#1877F2;}
.icons-circle a:nth-child(4){ top:50%; left:0; transform:translate(-50%,-50%); color:#000;}

/* النص السفلي */
.scan-text{
    position:absolute;
    bottom:110px;
    width:100%;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#333;
}

.add-contact{
    position:absolute;
    bottom:70px;
    width:100%;
    text-align:center;
    font-size:16px;
    font-weight:bold;
    color:#444;
}
</style>
</head>

<body>

<div class="card">

    <!-- الشعار ثابت -->
    <img src="logo.png" class="logo" alt="Shababek Logo">

    <!-- الأيقونات تدور فقط -->
    <div class="icons-circle">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-whatsapp"></i></a>
        <a href="#"><i class="fab fa-facebook-f"></i></a>
        <a href="#"><i class="fab fa-tiktok"></i></a>
    </div>

    <!-- النصوص السفلية -->
    <div class="scan-text">Scan to Add</div>
    <div class="add-contact">أضف إلى جهة الاتصال</div>

</div>

</body>
</html>

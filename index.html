<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبابيك للستائر - بطاقة الروابط</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* منع التمرير نهائياً */
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* الخلفية - الصورة الجديدة */
        .custom-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772584034/%D8%AA%D8%B5%D9%85%D9%8A%D9%85_%D8%A8%D8%AF%D9%88%D9%86_%D8%B9%D9%86%D9%88%D8%A7%D9%86_k0xc3e.png') no-repeat center center/cover;
            z-index: -2;
        }

        /* طبقة شفافة داكنة لتحسين وضوح النصوص */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* الحاوية الرئيسية - بحجم الشاشة بالكامل */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        /* النص الترحيبي من الصورة - مصغر */
        .brand-header {
            text-align: center;
            margin-bottom: 8px;
            color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
            transform: scale(0.9);
        }

        .brand-title-ar {
            font-size: 28px;
            font-weight: 900;
            line-height: 1.1;
            color: #d9b382;
        }

        .brand-title-ar span {
            font-size: 16px;
            color: white;
            display: block;
        }

        .brand-title-en {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .brand-title-en small {
            font-size: 10px;
            color: #d9b382;
            display: block;
        }

        /* عنوان القسم - مصغر جداً */
        .section-title {
            color: white;
            font-size: 12px;
            font-weight: 900;
            margin: 5px 0 3px;
            text-align: center;
            width: 100%;
            max-width: 350px;
            text-shadow: 1px 1px 3px black;
        }

        .section-title i {
            color: #d9b382;
            margin-left: 3px;
            font-size: 10px;
        }

        /* شبكة الروابط - مصغرة جداً */
        .links-grid {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* تصميم الرابط المصغر جداً */
        .link-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid rgba(217, 179, 130, 0.6);
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            color: white;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* تأخير بسيط للظهور */
        .link-item:nth-child(1) { animation-delay: 0.05s; }
        .link-item:nth-child(2) { animation-delay: 0.1s; }
        .link-item:nth-child(3) { animation-delay: 0.15s; }
        .link-item:nth-child(4) { animation-delay: 0.2s; }
        .link-item:nth-child(5) { animation-delay: 0.25s; }
        .link-item:nth-child(6) { animation-delay: 0.3s; }
        .link-item:nth-child(7) { animation-delay: 0.35s; }
        .link-item:nth-child(8) { animation-delay: 0.4s; }

        /* تأثير اللمس للهاتف */
        .link-item:active {
            transform: scale(0.98);
            background: rgba(217, 179, 130, 0.3);
            border-color: #d9b382;
        }

        /* أيقونة الرابط - مصغرة */
        .link-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(217, 179, 130, 0.5);
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .link-item:active .link-icon {
            background: #d9b382;
            transform: scale(1.05);
        }

        .link-item:active .link-icon i {
            color: #3d2e24 !important;
        }

        /* محتوى الرابط - مصغر */
        .link-content {
            flex: 1;
        }

        .link-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge {
            background: #d9b382;
            color: #3d2e24;
            font-size: 8px;
            padding: 2px 5px;
            border-radius: 20px;
            font-weight: 700;
        }

        .link-desc {
            font-size: 9px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .link-desc i {
            font-size: 4px;
            color: #d9b382;
        }

        /* السهم - مصغر */
        .link-arrow {
            width: 25px;
            height: 25px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(217, 179, 130, 0.5);
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .link-item:active .link-arrow {
            transform: translateX(-3px);
            background: #d9b382;
        }

        .link-item:active .link-arrow i {
            color: #3d2e24;
        }

        .link-arrow i {
            font-size: 10px;
        }

        /* قسم QR Code - مصغر جداً */
        .qr-section {
            width: 100%;
            max-width: 350px;
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid #d9b382;
            border-radius: 20px;
            padding: 8px 10px;
            text-align: center;
            animation: fadeIn 0.3s ease 0.5s both;
        }

        .qr-title {
            color: #d9b382;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .qr-title i {
            margin-left: 4px;
            font-size: 12px;
        }

        .qr-code-container {
            display: flex;
            justify-content: center;
            margin-bottom: 3px;
        }

        .qr-code {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            padding: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #d9b382;
        }

        .qr-code svg, .qr-code canvas {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        .qr-note {
            color: white;
            font-size: 8px;
            font-weight: 600;
        }

        .qr-note i {
            color: #d9b382;
            margin-left: 3px;
            font-size: 8px;
        }

        /* تذييل الصفحة - مصغر جداً */
        .footer {
            margin-top: 5px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 7px;
            text-align: center;
        }

        /* ===== لوحة التحكم (تظهر عند الحاجة) ===== */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-y: auto;
        }

        .admin-panel.show { display: flex; }

        .admin-content {
            background: white;
            width: 100%;
            max-width: 380px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 25px;
            padding: 20px;
            border: 3px solid #d9b382;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #d9b382;
        }

        .admin-header h2 { font-size: 18px; }

        .admin-close {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
        }

        .admin-tabs {
            display: flex;
            gap: 3px;
            margin-bottom: 15px;
        }

        .admin-tab {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .admin-tab.active { background: #d9b382; color: white; }

        .admin-section {
            background: #f8f8f8;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .admin-section h3 { font-size: 14px; margin-bottom: 10px; }

        .admin-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 13px;
        }

        .admin-btn {
            padding: 10px;
            font-size: 14px;
        }

        .admin-list {
            max-height: 200px;
        }

        .admin-item {
            padding: 8px;
        }

        .admin-item-btn {
            width: 30px;
            height: 30px;
            font-size: 12px;
        }

        /* إشعار */
        .notification {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #3d2e24;
            padding: 8px 20px;
            border-radius: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3), 0 0 0 2px #d9b382;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 3000;
            font-size: 12px;
            white-space: nowrap;
        }

        /* إخفاء شريط التمرير */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div class="custom-bg"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        <!-- النص الترحيبي من الصورة - مصغر -->
        <div class="brand-header">
            <div class="brand-title-ar">
                0.00 SHABABE
                <span>على وثوقه</span>
            </div>
            <div class="brand-title-en">
                SHADE & ELEGANCE
                <small>( Scan me! )</small>
            </div>
        </div>

        <!-- خدماتنا - روابط مصغرة -->
        <div class="section-title"><i class="fas fa-store"></i> خدماتنا</div>
        <div class="links-grid" id="store-links"></div>

        <!-- تابعنا على - روابط مصغرة -->
        <div class="section-title"><i class="fas fa-hashtag"></i> تابعنا على</div>
        <div class="links-grid" id="social-links"></div>

        <!-- روابط مهمة - روابط مصغرة -->
        <div class="section-title"><i class="fas fa-star"></i> روابط مهمة</div>
        <div class="links-grid" id="important-links"></div>

        <!-- QR Code مصغر -->
        <div class="qr-section">
            <div class="qr-title"><i class="fas fa-qrcode"></i> SCAN ME!</div>
            <div class="qr-code-container">
                <div class="qr-code" id="qrCodeContainer"></div>
            </div>
            <div class="qr-note"><i class="fas fa-camera"></i> أضف شبابيك على تيليجرام</div>
        </div>

        <div class="footer">© 2026 شبابيك للستائر</div>
    </div>

    <!-- لوحة التحكم -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <div class="admin-header">
                <h2>⚙️ لوحة التحكم</h2>
                <button class="admin-close" onclick="closeAdmin()">✕</button>
            </div>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('store')">🛍️ خدمات</button>
                <button class="admin-tab" onclick="switchTab('social')">📱 تواصل</button>
                <button class="admin-tab" onclick="switchTab('important')">⭐ مهمة</button>
            </div>
            <div class="admin-section">
                <h3>➕ إضافة رابط</h3>
                <input type="text" id="link-title" class="admin-input" placeholder="العنوان">
                <input type="text" id="link-desc" class="admin-input" placeholder="الوصف">
                <input type="url" id="link-url" class="admin-input" placeholder="الرابط">
                <input type="text" id="link-icon" class="admin-input" placeholder="الأيقونة">
                <button class="admin-btn" onclick="addLink()">➕ إضافة</button>
            </div>
            <div class="admin-section">
                <h3>📋 الروابط الحالية</h3>
                <div id="admin-links-list" class="admin-list"></div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"><i class="fas fa-check-circle"></i><span id="notif-message"></span></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        // بيانات الروابط (14 رابط في المجموع - مناسبة لشاشة واحدة)
        let linksData = {
            store: [
                { title: 'المتجر', desc: 'تسوق الآن', url: 'https://shababekcurtains.com/index.html?page=categories#homePage', icon: 'fas fa-store' },
                { title: 'منتجاتنا', desc: 'أحدث التصاميم', url: 'https://shababekcurtains.com/index.html?page=categories#homePage', icon: 'fas fa-tag' },
                { title: 'استشارة', desc: 'خبراء التصميم', url: 'https://wa.me/9647883002797?text=استشارة', icon: 'fas fa-headset' }
            ],
            social: [
                { title: 'فيسبوك', desc: 'تابعنا', url: 'https://www.facebook.com/profile.php?id=61587692021311', icon: 'fab fa-facebook' },
                { title: 'إنستغرام', desc: 'أحدث التصاميم', url: 'https://www.instagram.com/shababek.curtains/', icon: 'fab fa-instagram' },
                { title: 'تيك توك', desc: 'فيديوهات', url: 'https://www.tiktok.com/@shababek.curtains', icon: 'fab fa-tiktok' },
                { title: 'يوتيوب', desc: 'شاهد', url: 'https://youtube.com/@shababek.curtains', icon: 'fab fa-youtube' },
                { title: 'تويتر', desc: 'تغريدات', url: 'https://x.com/ShababekCurtain', icon: 'fa-brands fa-x-twitter' },
                { title: 'سناب', desc: 'يوميات', url: 'https://www.snapchat.com/add/shababekcurtin', icon: 'fab fa-snapchat' },
                { title: 'واتساب', desc: 'تواصل', url: 'https://wa.me/9647883002797', icon: 'fab fa-whatsapp' },
                { title: 'تيليجرام', desc: 'قناتنا', url: 'https://t.me/shababekcurtains', icon: 'fab fa-telegram' }
            ],
            important: [
                { title: 'منتدى', desc: 'مجتمع الديكور', url: 'https://shababekcurtains.com/ai.html', icon: 'fas fa-comments' },
                { title: 'طرق الدفع', desc: 'آمنة', url: 'https://shababekcurtains.com/index.html?page=categories#paymentPage', icon: 'fas fa-credit-card' },
                { title: 'من نحن', desc: 'تعرف علينا', url: 'https://shababekcurtains.com/index.html?page=categories#aboutPage', icon: 'fas fa-info-circle' }
            ]
        };

        let currentTab = 'store';
        let clickCount = 0;
        let clickTimer;

        // تحميل البيانات
        function loadData() {
            const saved = localStorage.getItem('shababek_links_card');
            if (saved) linksData = JSON.parse(saved);
            renderAllLinks();
        }

        function saveData() {
            localStorage.setItem('shababek_links_card', JSON.stringify(linksData));
        }

        // عرض الروابط
        function renderAllLinks() {
            renderLinks('store', 'store-links');
            renderLinks('social', 'social-links');
            renderLinks('important', 'important-links');
        }

        function renderLinks(category, elementId) {
            const container = document.getElementById(elementId);
            if (!container) return;
            container.innerHTML = linksData[category].map((link, idx) => `
                <a href="#" class="link-item" onclick="openAppLink('${link.url}', '${link.title}'); handleFirstLinkClick(event, ${idx}, '${category}'); return false;">
                    <div class="link-icon"><i class="${link.icon}"></i></div>
                    <div class="link-content">
                        <div class="link-title">${link.title}</div>
                        <div class="link-desc"><i class="fas fa-circle"></i> ${link.desc}</div>
                    </div>
                    <div class="link-arrow"><i class="fas fa-arrow-left"></i></div>
                </a>
            `).join('');
        }

        // فتح الروابط
        function openAppLink(url, title) {
            showNotif(`${title}`);
            window.location.href = url;
        }

        // نظام الـ 5 نقرات على أول رابط
        function handleFirstLinkClick(event, index, category) {
            if (category === 'store' && index === 0) {
                clickCount++;
                if (clickTimer) clearTimeout(clickTimer);
                clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
                if (clickCount >= 5) {
                    clickCount = 0;
                    openAdminPanel();
                }
            }
        }

        // إنشاء QR Code
        function generateQRCode() {
            const container = document.getElementById('qrCodeContainer');
            const allLinks = "شبابيك للستائر\n" + window.location.href;
            
            QRCode.toCanvas(document.createElement('canvas'), allLinks, { width: 150, margin: 1 }, function(err, canvas) {
                if (err) {
                    container.innerHTML = '<div style="color:white;">QR</div>';
                } else {
                    container.innerHTML = '';
                    canvas.style.width = '100%';
                    canvas.style.height = '100%';
                    canvas.style.borderRadius = '8px';
                    container.appendChild(canvas);
                }
            });
        }

        // لوحة التحكم
        function openAdminPanel() {
            document.getElementById('adminPanel').classList.add('show');
            switchTab('store');
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('show');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            showAdminLinks(tab);
        }

        function showAdminLinks(category) {
            let list = document.getElementById('admin-links-list');
            list.innerHTML = linksData[category].map((link, index) => `
                <div class="admin-item">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="${link.icon}" style="color:#d9b382;"></i>
                        <div><strong>${link.title}</strong></div>
                    </div>
                    <div class="admin-item-actions">
                        <button class="admin-item-btn edit" onclick="editLink('${category}', ${index})">✏️</button>
                        <button class="admin-item-btn delete" onclick="deleteLink('${category}', ${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function addLink() {
            let title = document.getElementById('link-title').value;
            let desc = document.getElementById('link-desc').value;
            let url = document.getElementById('link-url').value;
            let icon = document.getElementById('link-icon').value;
            if (!title || !url) { showNotif('أكمل البيانات'); return; }
            linksData[currentTab].push({ title, desc: desc || title, url, icon: icon || 'fas fa-link' });
            saveData(); renderAllLinks(); showAdminLinks(currentTab);
            document.getElementById('link-title').value = '';
            showNotif('✅ تم');
        }

        function editLink(category, index) {
            let link = linksData[category][index];
            let newTitle = prompt('العنوان:', link.title);
            if (newTitle) link.title = newTitle;
            saveData(); renderAllLinks(); showAdminLinks(currentTab);
            showNotif('✅ تم التعديل');
        }

        function deleteLink(category, index) {
            if (confirm('حذف؟')) {
                linksData[category].splice(index, 1);
                saveData(); renderAllLinks(); showAdminLinks(currentTab);
                showNotif('✅ تم الحذف');
            }
        }

        function showNotif(msg) {
            let n = document.getElementById('notification');
            document.getElementById('notif-message').innerText = msg;
            n.style.display = 'flex';
            setTimeout(() => n.style.display = 'none', 1000);
        }

        // بدء التشغيل
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            generateQRCode();
            setTimeout(() => showNotif('👋 اضغط 5 مرات على "المتجر"'), 1000);
        });
    </script>
</body>
</html>

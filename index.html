<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>شبابيك للستائر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #f5efe8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* الخلفية */
        .bg-image-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: -1;
        }

        .bg-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* الحاوية الرئيسية */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 0 15px;
        }

        /* حاوية الشعار والأيقونات */
        .wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
        }

        /* الشعار ثابت */
        .logo-image {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d9b382;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        /* حاوية الأيقونات الدوارة */
        .orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotateOrbit 25s linear infinite;
        }

        .orbit.paused {
            animation-play-state: paused;
        }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* الأيقونات */
        .icon-item {
            position: absolute;
            width: 55px;
            height: 55px;
            top: 50%;
            left: 50%;
            transform-origin: center;
            text-decoration: none;
            cursor: pointer;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #d9b382;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            color: white;
            transition: 0.2s;
        }

        .icon-item:active .icon-circle {
            transform: scale(0.95);
        }

        /* ألوان الأيقونات */
        .fa-store { color: #ffd700; }
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-facebook { color: #1877F2; }
        .fa-tiktok { color: #ffffff; }
        .fa-youtube { color: #FF0000; }
        .fa-x-twitter { color: #ffffff; }
        .fa-snapchat { color: #FFFC00; }
        .fa-telegram { color: #0088cc; }

        /* زر الاتصال */
        .contact-link {
            text-align: center;
            width: 100%;
            margin-top: 180px;
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #d9b382;
            padding: 14px 32px;
            border-radius: 60px;
            text-decoration: none;
            color: #2b1e16;
            font-weight: 700;
            font-size: 18px;
            border: 2px solid white;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .contact-button:active {
            transform: scale(0.97);
            background: #b58f5a;
            color: white;
        }

        /* موبايل */
        @media (max-width: 768px) {
            .wrapper {
                width: 320px;
                height: 320px;
                margin-top: -10px;
            }
            
            .logo-image {
                width: 110px;
                height: 110px;
            }
            
            .icon-item {
                width: 48px;
                height: 48px;
            }
            
            .icon-circle {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
            
            .contact-link {
                margin-top: 120px;
            }
            
            .contact-button {
                padding: 12px 28px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-image-container">
        <img src="https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772594834/%D8%AA%D8%B5%D9%85%D9%8A%D9%85_%D8%A8%D8%AF%D9%88%D9%86_%D8%B9%D9%86%D9%88%D8%A7%D9%86_1_kmg4fd.png" class="bg-image" alt="خلفية">
    </div>

    <div class="main-container">
        <div class="wrapper">
            <img src="https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772592833/shababek_logo.png" class="logo-image" alt="شعار شبابيك">
            <div class="orbit" id="orbit"></div>
        </div>

        <div class="contact-link">
            <a href="https://myqrcode.mobi/0148f3e2" target="_blank" rel="noopener noreferrer" class="contact-button">
                <i class="fas fa-qrcode"></i>
                ➕ اضف جهة اتصال
                <i class="fas fa-phone-alt"></i>
            </a>
        </div>
    </div>

    <script>
        // قائمة الأيقونات مع روابط مباشرة للتطبيقات (محدثة ومعتمدة)
        const iconsData = [
            { 
                icon: 'fas fa-store', 
                url: 'https://shababekcurtains.com/index.html?page=categories#homePage',
                type: 'web'
            },
            { 
                icon: 'fab fa-whatsapp', 
                url: 'https://wa.me/9647883002797', // رابط ويب واتساب (يعمل على جميع الأجهزة)
                intent: 'whatsapp://send?phone=9647883002797',
                type: 'whatsapp'
            },
            { 
                icon: 'fab fa-instagram', 
                url: 'https://instagram.com/_u/shababek.curtains', // رابط ويب إنستغرام
                intent: 'instagram://user?username=shababek.curtains',
                type: 'instagram'
            },
            { 
                icon: 'fab fa-facebook', 
                url: 'https://facebook.com/61587692021311', // رابط ويب فيسبوك
                intent: 'fb://page/61587692021311',
                type: 'facebook'
            },
            { 
                icon: 'fab fa-tiktok', 
                url: 'https://tiktok.com/@shababek.curtains', // رابط ويب تيك توك
                intent: 'tiktok://user?username=shababek.curtains',
                type: 'tiktok'
            },
            { 
                icon: 'fab fa-youtube', 
                url: 'https://youtube.com/@shababek.curtains', // رابط ويب يوتيوب
                intent: 'vnd.youtube://www.youtube.com/channel/UCxxxxx',
                type: 'youtube'
            },
            { 
                icon: 'fa-brands fa-x-twitter', 
                url: 'https://twitter.com/ShababekCurtain', // رابط ويب تويتر
                intent: 'twitter://user?screen_name=ShababekCurtain',
                type: 'twitter'
            },
            { 
                icon: 'fab fa-snapchat', 
                url: 'https://snapchat.com/add/shababekcurtin', // رابط ويب سناب شات
                intent: 'snapchat://add/shababekcurtin',
                type: 'snapchat'
            },
            { 
                icon: 'fab fa-telegram', 
                url: 'https://t.me/shababekcurtains', // رابط ويب تيليجرام
                intent: 'tg://resolve?domain=shababekcurtains',
                type: 'telegram'
            }
        ];

        // وظيفة فتح الرابط مع دعم التطبيقات
        function openAppLink(url, intent, type) {
            // محاولة فتح التطبيق أولاً
            if (intent) {
                // محاولة فتح رابط التطبيق
                window.location.href = intent;
                
                // إذا لم يتم فتح التطبيق خلال 500ms، نفتح رابط الويب
                setTimeout(() => {
                    window.location.href = url;
                }, 500);
            } else {
                // إذا لم يكن هناك intent، نفتح رابط الويب مباشرة
                window.location.href = url;
            }
        }

        // وظيفة عرض الأيقونات
        function renderIcons() {
            const orbit = document.getElementById('orbit');
            if (!orbit) return;
            
            orbit.innerHTML = '';
            const total = iconsData.length;
            const radius = 100; // المسافة من المركز
            
            iconsData.forEach((item, index) => {
                const angle = (index / total) * (2 * Math.PI);
                const x = radius * Math.cos(angle);
                const y = radius * Math.sin(angle);
                
                const icon = document.createElement('a');
                icon.className = 'icon-item';
                icon.href = '#';
                
                icon.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
                
                icon.innerHTML = `<div class="icon-circle"><i class="${item.icon}"></i></div>`;
                
                // إضافة حدث النقر المخصص
                icon.addEventListener('click', (e) => {
                    e.preventDefault(); // منع السلوك الافتراضي
                    
                    // إيقاف الدوران
                    const orbit = document.getElementById('orbit');
                    orbit.classList.add('paused');
                    
                    // فتح الرابط
                    openAppLink(item.url, item.intent, item.type);
                    
                    // استئناف الدوران بعد ثانيتين
                    setTimeout(() => {
                        orbit.classList.remove('paused');
                    }, 2000);
                    
                    return false;
                });
                
                orbit.appendChild(icon);
            });
        }

        document.addEventListener('DOMContentLoaded', renderIcons);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>شبابيك للستائر - الروابط</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0f0a 0%, #3d2e24 100%);
            position: relative;
            overflow-x: hidden;
        }
        /* خلفية الصورة الجديدة التي أرسلتها */
        .custom-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772584034/%D8%AA%D8%B5%D9%85%D9%8A%D9%85_%D8%A8%D8%AF%D9%88%D9%86_%D8%B9%D9%86%D9%88%D8%A7%D9%86_k0xc3e.png') no-repeat center center/cover;
            opacity: 0.2;
            z-index: -1;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(217,179,130,0.15), transparent 60%);
            z-index: -1;
        }
        .container {
            position: relative; z-index: 1;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px 15px;
        }
        /* شعار النص "شبابيك" من الصورة */
        .brand-header {
            text-align: center; margin-bottom: 20px;
            animation: fadeInDown 0.8s ease;
        }
        .brand-title-ar {
            font-size: 42px; font-weight: 900; line-height: 1.2;
            color: #d9b382; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .brand-title-ar span {
            display: block; font-size: 24px; font-weight: 600;
            color: rgba(255,255,255,0.9); letter-spacing: 2px;
        }
        .brand-title-en {
            font-size: 24px; font-weight: 700; color: white;
            text-transform: uppercase; margin-top: 5px;
        }
        .brand-title-en small {
            font-size: 14px; color: #d9b382; display: block;
        }
        /* عنوان القسم */
        .section-title {
            color: white; font-size: 18px; font-weight: 900;
            margin: 25px 0 15px; text-align: center;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; width: 100%; max-width: 400px;
        }
        .section-title::before, .section-title::after {
            content: ''; flex: 1; height: 2px;
            background: linear-gradient(90deg, transparent, #d9b382, transparent);
        }
        .section-title i { color: #d9b382; font-size: 22px; }
        /* شبكة الروابط */
        .links-grid {
            width: 100%; max-width: 400px;
            display: flex; flex-direction: column; gap: 15px;
        }
        /* تصميم الرابط داخل المستطيل (جميع الأيقونات داخله) */
        .link-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px 20px;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            border: 2px solid rgba(217,179,130,0.5);
            border-radius: 20px;  /* مستطيل بحواف ناعمة */
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            color: white; text-decoration: none;
            transition: all 0.3s ease; cursor: pointer;
            animation: slideIn 0.5s ease forwards;
            opacity: 0; transform: translateX(-20px);
        }
        /* التأثير الذهبي عند المرور (مع الحفاظ على التصميم) */
        .link-item:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #d9b382;
            background: rgba(217,179,130,0.2);
            box-shadow: 0 15px 30px rgba(217,179,130,0.4);
        }
        .link-item:hover .link-icon {
            background: #d9b382;
            transform: scale(1.1) rotate(5deg);
        }
        .link-item:hover .link-icon i {
            color: #3d2e24 !important;
        }
        .link-item:hover .link-arrow {
            transform: translateX(-5px);
            color: #d9b382;
        }
        /* أيقونة الرابط داخل المستطيل */
        .link-icon {
            width: 50px; height: 50px; border-radius: 12px; /* مربع بحواف ناعمة */
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; background: rgba(255,255,255,0.15);
            border: 1px solid rgba(217,179,130,0.5);
            transition: all 0.3s ease; flex-shrink: 0;
        }
        /* محتوى الرابط */
        .link-content { flex: 1; }
        .link-title {
            font-size: 18px; font-weight: 800; margin-bottom: 4px;
            transition: color 0.3s ease;
        }
        .link-desc {
            font-size: 13px; opacity: 0.8;
            display: flex; align-items: center; gap: 5px;
        }
        .link-desc i { font-size: 6px; color: #d9b382; }
        /* السهم */
        .link-arrow {
            width: 35px; height: 35px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s ease; flex-shrink: 0;
        }
        /* قسم QR Code (كما في الصورة) */
        .qr-section {
            width: 100%; max-width: 400px; margin-top: 25px;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
            border: 2px solid #d9b382; border-radius: 25px;
            padding: 15px; text-align: center;
            animation: fadeIn 1s ease 0.8s both;
        }
        .qr-title {
            color: #d9b382; font-size: 16px; font-weight: 700;
            letter-spacing: 2px; margin-bottom: 10px;
        }
        .qr-title i { margin-left: 5px; }
        .qr-placeholder {
            width: 120px; height: 120px; margin: 0 auto;
            background: white; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid #d9b382;
        }
        .qr-placeholder svg {
            width: 100px; height: 100px;
        }
        .qr-note {
            color: white; font-size: 14px; margin-top: 8px;
        }
        .qr-note i { color: #d9b382; margin-left: 4px; }
        /* تذييل */
        .footer {
            margin-top: 25px; color: rgba(255,255,255,0.4);
            font-size: 13px; text-align: center;
        }
        .footer i { color: #d9b382; animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
        @keyframes fadeInDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideIn { to{opacity:1;transform:translateX(0)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        /* ===== لوحة التحكم (5 نقرات على أول رابط) ===== */
        .admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); backdrop-filter: blur(15px);
            z-index: 2000; display: none; justify-content: center; align-items: center;
            padding: 15px;
        }
        .admin-panel.show { display: flex; animation: fadeIn 0.3s; }
        .admin-content {
            background: white; width: 100%; max-width: 420px;
            max-height: 90vh; overflow-y: auto; border-radius: 30px;
            padding: 25px; border: 3px solid #d9b382;
        }
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #d9b382;
        }
        .admin-header h2 { color: #3d2e24; font-weight: 900; font-size: 22px; }
        .admin-close {
            width: 45px; height: 45px; border-radius: 50%; background: #f0f0f0;
            border: none; font-size: 22px; cursor: pointer; transition: 0.3s;
        }
        .admin-close:active { background: #e74c3c; color: white; transform: rotate(90deg); }
        .admin-tabs {
            display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .admin-tab {
            flex: 1; padding: 12px; background: #f0f0f0; border: none;
            border-radius: 15px; font-weight: 700; cursor: pointer;
            min-width: 80px;
        }
        .admin-tab.active { background: #d9b382; color: white; }
        .admin-section {
            background: #f8f8f8; border-radius: 20px; padding: 20px; margin-bottom: 20px;
        }
        .admin-section h3 { color: #b58f5a; margin-bottom: 15px; font-size: 18px; }
        .admin-input {
            width: 100%; padding: 14px; margin-bottom: 12px;
            border: 2px solid #eee; border-radius: 15px;
            font-family: 'Cairo'; font-size: 15px;
        }
        .admin-input:focus { border-color: #d9b382; outline: none; }
        .admin-btn {
            background: #d9b382; color: white; border: none;
            padding: 15px; border-radius: 15px; font-weight: 900;
            width: 100%; cursor: pointer; font-size: 16px;
        }
        .admin-btn:active { background: #b58f5a; transform: scale(0.98); }
        .admin-list {
            display: flex; flex-direction: column; gap: 10px;
            max-height: 250px; overflow-y: auto;
        }
        .admin-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: white; border-radius: 12px;
            border: 1px solid #eee;
        }
        .admin-item-actions { display: flex; gap: 5px; }
        .admin-item-btn {
            width: 40px; height: 40px; border: none; border-radius: 10px;
            cursor: pointer; font-size: 16px;
        }
        .admin-item-btn.edit { background: #3498db; color: white; }
        .admin-item-btn.delete { background: #e74c3c; color: white; }

        /* إشعار */
        .notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            color: #3d2e24; padding: 15px 30px; border-radius: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 0 2px #d9b382;
            display: none; align-items: center; gap: 12px; z-index: 3000;
            border-right: 5px solid #d9b382; font-weight: 700;
            font-size: 15px; width: 90%; max-width: 350px;
            text-align: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="custom-bg"></div>
    <div class="bg-overlay"></div>

    <div class="container">
        <!-- Header من الصورة -->
        <div class="brand-header">
            <div class="brand-title-ar">
                شبابيك
                <span>شـــــابـــــيـــــك</span>
            </div>
            <div class="brand-title-en">
                SHABABEK
                <small>SHADE & ELEGANCE</small>
            </div>
        </div>

        <!-- خدماتنا -->
        <div class="section-title"><i class="fas fa-store"></i> خدماتنا</div>
        <div class="links-grid" id="store-links"></div>

        <!-- تابعنا على -->
        <div class="section-title"><i class="fas fa-hashtag"></i> تابعنا على</div>
        <div class="links-grid" id="social-links"></div>

        <!-- روابط مهمة -->
        <div class="section-title"><i class="fas fa-star"></i> روابط مهمة</div>
        <div class="links-grid" id="important-links"></div>

        <!-- QR Code (كما في الصورة) -->
        <div class="qr-section">
            <div class="qr-title"><i class="fas fa-qrcode"></i> SCAN TO ADD</div>
            <div class="qr-placeholder">
                <svg viewBox="0 0 100 100">
                    <rect x="10" y="10" width="30" height="30" fill="#d9b382"/>
                    <rect x="50" y="10" width="30" height="30" fill="#3d2e24"/>
                    <rect x="10" y="50" width="30" height="30" fill="#3d2e24"/>
                    <rect x="50" y="50" width="30" height="30" fill="#d9b382"/>
                    <rect x="70" y="70" width="15" height="15" fill="#d9b382"/>
                    <rect x="20" y="20" width="10" height="10" fill="white"/>
                    <rect x="60" y="20" width="10" height="10" fill="white"/>
                    <rect x="20" y="60" width="10" height="10" fill="white"/>
                </svg>
            </div>
            <div class="qr-note"><i class="fas fa-camera"></i> أضف شبابيك على تيليجرام</div>
        </div>

        <div class="footer">© 2026 شبابيك للستائر • <i class="fas fa-heart"></i> من العراق</div>
    </div>

    <!-- لوحة التحكم (تظهر بعد 5 نقرات على أول رابط) -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <div class="admin-header">
                <h2>⚙️ لوحة التحكم</h2>
                <button class="admin-close" onclick="closeAdmin()">✕</button>
            </div>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('store')">🛍️ خدمات</button>
                <button class="admin-tab" onclick="switchTab('social')">📱 تواصل</button>
                <button class="admin-tab" onclick="switchTab('important')">⭐ مهمة</button>
            </div>
            <div class="admin-section">
                <h3>➕ إضافة رابط</h3>
                <input type="text" id="link-title" class="admin-input" placeholder="العنوان">
                <input type="text" id="link-desc" class="admin-input" placeholder="الوصف">
                <input type="url" id="link-url" class="admin-input" placeholder="الرابط">
                <input type="text" id="link-icon" class="admin-input" placeholder="الأيقونة (fab fa-facebook)">
                <button class="admin-btn" onclick="addLink()">➕ إضافة</button>
            </div>
            <div class="admin-section">
                <h3>📋 الروابط الحالية</h3>
                <div id="admin-links-list" class="admin-list"></div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"><i class="fas fa-check-circle"></i><span id="notif-message"></span></div>

    <script>
        // بيانات الروابط (محدثة)
        let linksData = {
            store: [
                { title: 'المتجر الإلكتروني', desc: 'تصفح جميع المنتجات', url: 'https://shababekcurtains.com/index.html?page=categories#homePage', icon: 'fas fa-store' },
                { title: 'منتجاتنا', desc: 'أحدث التصاميم', url: 'https://shababekcurtains.com/index.html?page=categories#homePage', icon: 'fas fa-tag' },
                { title: 'استشارة مجانية', desc: 'خبراء التصميم', url: 'https://wa.me/9647883002797?text=استشارة', icon: 'fas fa-headset' }
            ],
            social: [
                { title: 'فيسبوك', desc: 'تابعنا على فيسبوك', url: 'https://www.facebook.com/profile.php?id=61587692021311', icon: 'fab fa-facebook' },
                { title: 'إنستغرام', desc: 'أحدث التصاميم', url: 'https://www.instagram.com/shababek.curtains/', icon: 'fab fa-instagram' },
                { title: 'تيك توك', desc: 'فيديوهات قصيرة', url: 'https://www.tiktok.com/@shababek.curtains', icon: 'fab fa-tiktok' },
                { title: 'يوتيوب', desc: 'شاهد تصاميمنا', url: 'https://youtube.com/@shababek.curtains', icon: 'fab fa-youtube' },
                { title: 'تويتر', desc: 'تغريدات على X', url: 'https://x.com/ShababekCurtain', icon: 'fa-brands fa-x-twitter' },
                { title: 'سناب شات', desc: 'يومياتنا', url: 'https://www.snapchat.com/add/shababekcurtin', icon: 'fab fa-snapchat' },
                { title: 'واتساب', desc: 'تواصل مباشر', url: 'https://wa.me/9647883002797', icon: 'fab fa-whatsapp' },
                { title: 'تيليجرام', desc: 'قناتنا', url: 'https://t.me/shababekcurtains', icon: 'fab fa-telegram' }
            ],
            important: [
                { title: 'منتدى شبابيك', desc: 'مجتمع الديكور', url: 'https://shababekcurtains.com/ai.html', icon: 'fas fa-comments' },
                { title: 'طرق الدفع', desc: 'طرق دفع آمنة', url: 'https://shababekcurtains.com/index.html?page=categories#paymentPage', icon: 'fas fa-credit-card' },
                { title: 'من نحن', desc: 'تعرف على فريقنا', url: 'https://shababekcurtains.com/index.html?page=categories#aboutPage', icon: 'fas fa-info-circle' }
            ]
        };

        let currentTab = 'store';
        let clickCount = 0;
        let clickTimer;
        let firstLinkClicked = false;  // لتمييز أول رابط

        function loadData() {
            const saved = localStorage.getItem('shababek_links_final');
            if (saved) linksData = JSON.parse(saved);
            renderAllLinks();
        }
        function saveData() { localStorage.setItem('shababek_links_final', JSON.stringify(linksData)); }

        function renderAllLinks() {
            renderLinks('store', 'store-links');
            renderLinks('social', 'social-links');
            renderLinks('important', 'important-links');
        }

        function renderLinks(category, elementId) {
            const container = document.getElementById(elementId);
            if (!container) return;
            container.innerHTML = linksData[category].map((link, idx) => `
                <a href="#" class="link-item" onclick="openAppLink('${link.url}', '${link.title}'); handleFirstLinkClick(event, ${idx}, '${category}'); return false;">
                    <div class="link-icon"><i class="${link.icon}"></i></div>
                    <div class="link-content">
                        <div class="link-title">${link.title}</div>
                        <div class="link-desc"><i class="fas fa-circle"></i> ${link.desc}</div>
                    </div>
                    <div class="link-arrow"><i class="fas fa-arrow-left"></i></div>
                </a>
            `).join('');
        }

        // دالة فتح الروابط المباشرة
        function openAppLink(url, title) {
            showNotif(`جاري فتح ${title}...`);
            if (url.includes('wa.me') || url.includes('whatsapp')) {
                let phone = url.match(/\d+/g)?.join('') || '9647883002797';
                window.location.href = `whatsapp://send?phone=${phone}`;
                setTimeout(() => window.location.href = url, 800);
            } else if (url.includes('instagram.com')) {
                let username = url.split('/').filter(s => s && !s.includes('?')).pop() || 'shababek.curtains';
                window.location.href = `instagram://user?username=${username}`;
                setTimeout(() => window.location.href = url, 800);
            } else if (url.includes('facebook.com')) {
                window.location.href = `fb://page/61587692021311`;
                setTimeout(() => window.location.href = url, 800);
            } else if (url.includes('tiktok.com')) {
                let username = url.split('@')[1]?.split('/')[0] || 'shababek.curtains';
                window.location.href = `tiktok://user?username=${username}`;
                setTimeout(() => window.location.href = url, 800);
            } else if (url.includes('t.me')) {
                let username = url.split('/').pop()?.split('?')[0] || 'shababekcurtains';
                window.location.href = `tg://resolve?domain=${username}`;
                setTimeout(() => window.location.href = url, 800);
            } else if (url.includes('x.com') || url.includes('twitter.com')) {
                let username = url.split('/').pop()?.split('?')[0] || 'ShababekCurtain';
                window.location.href = `twitter://user?screen_name=${username}`;
                setTimeout(() => window.location.href = url, 800);
            } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                window.location.href = `vnd.youtube://www.youtube.com/channel/UCxxx`;
                setTimeout(() => window.location.href = url, 800);
            } else {
                window.location.href = url;
            }
        }

        // نظام الـ 5 نقرات على أول رابط فقط
        function handleFirstLinkClick(event, index, category) {
            if (category === 'store' && index === 0) { // أول رابط في "خدماتنا"
                clickCount++;
                if (clickTimer) clearTimeout(clickTimer);
                clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
                if (clickCount >= 5) {
                    clickCount = 0;
                    openAdminPanel();
                }
            }
        }

        function openAdminPanel() {
            document.getElementById('adminPanel').classList.add('show');
            switchTab('store');
        }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('show'); }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            showAdminLinks(tab);
        }

        function showAdminLinks(category) {
            let list = document.getElementById('admin-links-list');
            list.innerHTML = linksData[category].map((link, index) => `
                <div class="admin-item">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <i class="${link.icon}" style="color:#d9b382; font-size:20px;"></i>
                        <div><strong>${link.title}</strong><div style="font-size:11px; color:#999;">${link.url.substring(0,30)}</div></div>
                    </div>
                    <div class="admin-item-actions">
                        <button class="admin-item-btn edit" onclick="editLink('${category}', ${index})">✏️</button>
                        <button class="admin-item-btn delete" onclick="deleteLink('${category}', ${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function addLink() {
            let title = document.getElementById('link-title').value;
            let desc = document.getElementById('link-desc').value;
            let url = document.getElementById('link-url').value;
            let icon = document.getElementById('link-icon').value;
            if (!title || !url) { showNotif('الرجاء إدخال العنوان والرابط', 'error'); return; }
            linksData[currentTab].push({ title, desc: desc || `تابعنا على ${title}`, url, icon: icon || 'fas fa-link' });
            saveData(); renderAllLinks(); showAdminLinks(currentTab);
            document.getElementById('link-title').value = ''; document.getElementById('link-desc').value = '';
            document.getElementById('link-url').value = ''; document.getElementById('link-icon').value = '';
            showNotif('✅ تمت الإضافة');
        }

        function editLink(category, index) {
            let link = linksData[category][index];
            let newTitle = prompt('تعديل العنوان:', link.title);
            if (newTitle) link.title = newTitle;
            let newUrl = prompt('تعديل الرابط:', link.url);
            if (newUrl) link.url = newUrl;
            saveData(); renderAllLinks(); showAdminLinks(currentTab);
            showNotif('✅ تم التعديل');
        }

        function deleteLink(category, index) {
            if (confirm('حذف الرابط؟')) {
                linksData[category].splice(index, 1);
                saveData(); renderAllLinks(); showAdminLinks(currentTab);
                showNotif('✅ تم الحذف');
            }
        }

        function showNotif(msg) {
            let n = document.getElementById('notification');
            document.getElementById('notif-message').innerText = msg;
            n.style.display = 'flex';
            setTimeout(() => n.style.display = 'none', 2000);
        }

        // تحميل عند البدء
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setTimeout(() => showNotif('👋 اضغط 5 مرات على أول رابط للتحكم'), 1500);
        });
    </script>
</body>
</html>

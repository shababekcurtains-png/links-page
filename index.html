<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شبابيك للستائر - أيقونات سريعة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* الصورة المرفقة كخلفية */
        .custom-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772584034/%D8%AA%D8%B5%D9%85%D9%8A%D9%85_%D8%A8%D8%AF%D9%88%D9%86_%D8%B9%D9%86%D9%88%D8%A7%D9%86_k0xc3e.png') no-repeat center center/cover;
            z-index: -1;
        }

        /* الحاوية الرئيسية */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 10px;
        }

        /* المساحة العلوية (الشعار) - نتركها فارغة لأنها موجودة في الصورة */
        .top-spacer {
            height: 18vh;
            width: 100%;
        }

        /* المنطقة الوسطى - أيقونات فقط (بدون نصوص) */
        .icons-container {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            border-radius: 30px;
            padding: 12px 10px;
            margin: 5px 0;
        }

        /* صف الأيقونات */
        .icons-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
            flex-wrap: wrap;
        }

        /* أيقونة مفردة */
        .icon-item {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1.5px solid rgba(217, 179, 130, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* تأخير ظهور الأيقونات */
        .icon-item:nth-child(1) { animation-delay: 0.02s; }
        .icon-item:nth-child(2) { animation-delay: 0.04s; }
        .icon-item:nth-child(3) { animation-delay: 0.06s; }
        .icon-item:nth-child(4) { animation-delay: 0.08s; }
        .icon-item:nth-child(5) { animation-delay: 0.1s; }
        .icon-item:nth-child(6) { animation-delay: 0.12s; }
        .icon-item:nth-child(7) { animation-delay: 0.14s; }
        .icon-item:nth-child(8) { animation-delay: 0.16s; }

        .icon-item:active {
            transform: scale(0.92);
            background: #d9b382;
            border-color: white;
        }

        .icon-item:active i {
            color: #3d2e24 !important;
        }

        /* ألوان خاصة لبعض الأيقونات عند التمرير (اختياري) */
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-facebook { color: #1877F2; }
        .fa-youtube { color: #FF0000; }
        .fa-telegram { color: #0088cc; }
        .fa-tiktok { color: #ffffff; }
        .fa-x-twitter { color: #ffffff; }
        .fa-snapchat { color: #FFFC00; }

        /* المنطقة السفلية - QR code */
        .qr-container {
            width: 100%;
            max-width: 300px;
            margin-top: 5px;
            display: flex;
            justify-content: center;
        }

        .qr-box {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            padding: 3px;
            border: 2px solid #d9b382;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .qr-box:active {
            transform: scale(0.95);
        }

        .qr-box canvas {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        /* المساحة السفلية الفارغة */
        .bottom-spacer {
            height: 10vh;
            width: 100%;
        }

        /* لوحة التحكم (تبقى كما هي) */
        .admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-y: auto;
        }

        .admin-panel.show { display: flex; }

        .admin-content {
            background: white;
            width: 100%;
            max-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #d9b382;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #d9b382;
        }

        .admin-header h2 { font-size: 16px; }

        .admin-close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
        }

        .admin-tabs {
            display: flex;
            gap: 3px;
            margin-bottom: 10px;
        }

        .admin-tab {
            flex: 1;
            padding: 6px;
            font-size: 11px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .admin-tab.active { background: #d9b382; color: white; }

        .admin-section {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .admin-section h3 { font-size: 13px; margin-bottom: 8px; }

        .admin-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 6px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 12px;
        }

        .admin-btn {
            padding: 8px;
            font-size: 13px;
        }

        .admin-list {
            max-height: 180px;
        }

        .admin-item {
            padding: 6px;
        }

        .admin-item-btn {
            width: 28px;
            height: 28px;
            font-size: 11px;
        }

        .notification {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #3d2e24;
            padding: 6px 15px;
            border-radius: 30px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3), 0 0 0 2px #d9b382;
            display: none;
            align-items: center;
            gap: 5px;
            z-index: 3000;
            font-size: 11px;
            white-space: nowrap;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <!-- الصورة المرفقة كخلفية -->
    <div class="custom-bg"></div>

    <div class="container">
        <!-- مساحة علوية (الشعار موجود في الصورة) -->
        <div class="top-spacer"></div>

        <!-- المنطقة الوسطى - أيقونات فقط -->
        <div class="icons-container" id="iconsContainer"></div>

        <!-- QR code -->
        <div class="qr-container">
            <div class="qr-box" id="qrBox" onclick="openQRCode()">
                <div id="qrCodeContainer"></div>
            </div>
        </div>

        <!-- مساحة سفلية -->
        <div class="bottom-spacer"></div>
    </div>

    <!-- لوحة التحكم -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-content">
            <div class="admin-header">
                <h2>⚙️ لوحة التحكم</h2>
                <button class="admin-close" onclick="closeAdmin()">✕</button>
            </div>
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('icons')">🔘 الأيقونات</button>
            </div>
            <div class="admin-section">
                <h3>➕ إضافة أيقونة</h3>
                <input type="text" id="icon-class" class="admin-input" placeholder="اسم الأيقونة (fab fa-facebook)">
                <input type="url" id="icon-url" class="admin-input" placeholder="الرابط">
                <button class="admin-btn" onclick="addIcon()">➕ إضافة</button>
            </div>
            <div class="admin-section">
                <h3>📋 الأيقونات الحالية</h3>
                <div id="admin-icons-list" class="admin-list"></div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"><i class="fas fa-check-circle"></i><span id="notif-message"></span></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        // قائمة الأيقونات فقط
        let iconsData = [
            { icon: 'fab fa-facebook', url: 'https://www.facebook.com/profile.php?id=61587692021311' },
            { icon: 'fab fa-instagram', url: 'https://www.instagram.com/shababek.curtains/' },
            { icon: 'fab fa-tiktok', url: 'https://www.tiktok.com/@shababek.curtains' },
            { icon: 'fab fa-youtube', url: 'https://youtube.com/@shababek.curtains' },
            { icon: 'fa-brands fa-x-twitter', url: 'https://x.com/ShababekCurtain' },
            { icon: 'fab fa-snapchat', url: 'https://www.snapchat.com/add/shababekcurtin' },
            { icon: 'fab fa-whatsapp', url: 'https://wa.me/9647883002797' },
            { icon: 'fab fa-telegram', url: 'https://t.me/shababekcurtains' },
            { icon: 'fas fa-store', url: 'https://shababekcurtains.com/index.html?page=categories#homePage' },
            { icon: 'fas fa-tag', url: 'https://shababekcurtains.com/index.html?page=categories#homePage' },
            { icon: 'fas fa-headset', url: 'https://wa.me/9647883002797?text=استشارة' },
            { icon: 'fas fa-comments', url: 'https://shababekcurtains.com/ai.html' },
            { icon: 'fas fa-credit-card', url: 'https://shababekcurtains.com/index.html?page=categories#paymentPage' },
            { icon: 'fas fa-info-circle', url: 'https://shababekcurtains.com/index.html?page=categories#aboutPage' }
        ];

        let clickCount = 0;
        let clickTimer;

        // تحميل البيانات
        function loadData() {
            const saved = localStorage.getItem('shababek_icons');
            if (saved) iconsData = JSON.parse(saved);
            renderIcons();
        }

        function saveData() {
            localStorage.setItem('shababek_icons', JSON.stringify(iconsData));
        }

        // عرض الأيقونات في المنطقة الوسطى (صفوف متعددة)
        function renderIcons() {
            const container = document.getElementById('iconsContainer');
            if (!container) return;

            // تقسيم الأيقونات إلى صفوف (4 أيقونات في كل صف)
            let html = '';
            for (let i = 0; i < iconsData.length; i += 4) {
                html += '<div class="icons-row">';
                for (let j = i; j < i + 4 && j < iconsData.length; j++) {
                    const icon = iconsData[j];
                    html += `<div class="icon-item" onclick="openIconLink('${icon.url}'); handleIconClick(event, ${j}); return false;">
                        <i class="${icon.icon}"></i>
                    </div>`;
                }
                html += '</div>';
            }
            container.innerHTML = html;
        }

        // فتح رابط الأيقونة
        function openIconLink(url) {
            showNotif('جاري الفتح...');
            window.location.href = url;
        }

        // نظام الـ 5 نقرات على أي أيقونة
        function handleIconClick(event, index) {
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
            if (clickCount >= 5) {
                clickCount = 0;
                openAdminPanel();
            }
        }

        // إنشاء QR code
        function generateQRCode() {
            const container = document.getElementById('qrCodeContainer');
            const allLinks = "شبابيك للستائر\n" + window.location.href;
            
            QRCode.toCanvas(document.createElement('canvas'), allLinks, { width: 100, margin: 1 }, function(err, canvas) {
                if (err) {
                    container.innerHTML = 'QR';
                } else {
                    container.innerHTML = '';
                    canvas.style.width = '100%';
                    canvas.style.height = '100%';
                    canvas.style.borderRadius = '8px';
                    container.appendChild(canvas);
                }
            });
        }

        // فتح QR code (يمكن ربطه برابط)
        function openQRCode() {
            showNotif('شبابيك للستائر');
        }

        // لوحة التحكم
        function openAdminPanel() {
            document.getElementById('adminPanel').classList.add('show');
            showAdminIcons();
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('show');
        }

        function switchTab(tab) {
            showAdminIcons();
        }

        function showAdminIcons() {
            let list = document.getElementById('admin-icons-list');
            list.innerHTML = iconsData.map((icon, index) => `
                <div class="admin-item">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="${icon.icon}" style="color:#d9b382; font-size:16px;"></i>
                        <span style="font-size:12px;">${icon.url.substring(0,20)}...</span>
                    </div>
                    <div class="admin-item-actions">
                        <button class="admin-item-btn edit" onclick="editIcon(${index})">✏️</button>
                        <button class="admin-item-btn delete" onclick="deleteIcon(${index})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function addIcon() {
            let iconClass = document.getElementById('icon-class').value;
            let iconUrl = document.getElementById('icon-url').value;
            if (!iconClass || !iconUrl) { showNotif('أكمل البيانات'); return; }
            iconsData.push({ icon: iconClass, url: iconUrl });
            saveData(); renderIcons(); showAdminIcons();
            document.getElementById('icon-class').value = '';
            document.getElementById('icon-url').value = '';
            showNotif('✅ تمت الإضافة');
        }

        function editIcon(index) {
            let newUrl = prompt('الرابط الجديد:', iconsData[index].url);
            if (newUrl) iconsData[index].url = newUrl;
            saveData(); renderIcons(); showAdminIcons();
            showNotif('✅ تم التعديل');
        }

        function deleteIcon(index) {
            if (confirm('حذف الأيقونة؟')) {
                iconsData.splice(index, 1);
                saveData(); renderIcons(); showAdminIcons();
                showNotif('✅ تم الحذف');
            }
        }

        function showNotif(msg) {
            let n = document.getElementById('notification');
            document.getElementById('notif-message').innerText = msg;
            n.style.display = 'flex';
            setTimeout(() => n.style.display = 'none', 800);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            generateQRCode();
            setTimeout(() => showNotif('👋 5 مرات على أي أيقونة'), 1000);
        });
    </script>
</body>
</html>

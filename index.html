<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>شبابيك للستائر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #f5efe8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* الخلفية */
        .bg-image-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: -1;
        }

        .bg-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* الحاوية الرئيسية */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
        }

        /* حاوية الشعار والأيقونات */
        .wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -60px; /* رفع الشعار والأيقونات للأعلى */
        }

        /* الشعار ثابت */
        .logo-image {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d9b382;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }

        /* حاوية الأيقونات الدوارة */
        .orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotateOrbit 25s linear infinite;
        }

        .orbit.paused {
            animation-play-state: paused;
        }

        @keyframes rotateOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* الأيقونات */
        .icon-item {
            position: absolute;
            width: 55px;
            height: 55px;
            top: 50%;
            left: 50%;
            transform-origin: center;
            text-decoration: none;
            cursor: pointer;
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #d9b382;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            color: white;
            transition: 0.2s;
        }

        .icon-item:active .icon-circle {
            transform: scale(0.95);
        }

        /* ألوان الأيقونات */
        .fa-store { color: #ffd700; }
        .fa-whatsapp { color: #25D366; }
        .fa-instagram { color: #E4405F; }
        .fa-facebook { color: #1877F2; }
        .fa-tiktok { color: #ffffff; }
        .fa-youtube { color: #FF0000; }
        .fa-x-twitter { color: #ffffff; }
        .fa-snapchat { color: #FFFC00; }
        .fa-telegram { color: #0088cc; }

        /* زر الاتصال - منزل للأسفل */
        .contact-link {
            text-align: center;
            margin-top: 100px; /* زيادة المسافة لإنزال الزر */
            width: 100%;
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #d9b382;
            padding: 14px 32px;
            border-radius: 60px;
            text-decoration: none;
            color: #2b1e16;
            font-weight: 700;
            font-size: 18px;
            border: 2px solid white;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .contact-button:active {
            transform: scale(0.97);
            background: #b58f5a;
            color: white;
        }

        /* موبايل */
        @media (max-width: 768px) {
            .wrapper {
                width: 320px;
                height: 320px;
                margin-top: -40px;
            }
            
            .logo-image {
                width: 110px;
                height: 110px;
            }
            
            .icon-item {
                width: 48px;
                height: 48px;
            }
            
            .icon-circle {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
            
            .contact-link {
                margin-top: 70px;
            }
            
            .contact-button {
                padding: 12px 28px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-image-container">
        <img src="https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772594834/%D8%AA%D8%B5%D9%85%D9%8A%D9%85_%D8%A8%D8%AF%D9%88%D9%86_%D8%B9%D9%86%D9%88%D8%A7%D9%86_1_kmg4fd.png" class="bg-image" alt="خلفية">
    </div>

    <div class="main-container">
        <div class="wrapper">
            <img src="https://res.cloudinary.com/dnkuwf8q9/image/upload/v1772592833/shababek_logo.png" class="logo-image" alt="شعار شبابيك">
            <div class="orbit" id="orbit"></div>
        </div>

        <div class="contact-link">
            <a href="https://myqrcode.mobi/0148f3e2" target="_blank" rel="noopener noreferrer" class="contact-button">
                <i class="fas fa-qrcode"></i>
                ➕ اضف جهة اتصال
                <i class="fas fa-phone-alt"></i>
            </a>
        </div>
    </div>

    <script>
        // قائمة الأيقونات مع روابط مباشرة للتطبيقات
        const iconsData = [
            { icon: 'fas fa-store', url: 'https://shababekcurtains.com/index.html?page=categories#homePage' },
            { icon: 'fab fa-whatsapp', url: 'whatsapp://send?phone=9647883002797' },
            { icon: 'fab fa-instagram', url: 'instagram://user?username=shababek.curtains' },
            { icon: 'fab fa-facebook', url: 'fb://page/61587692021311' },
            { icon: 'fab fa-tiktok', url: 'tiktok://user?username=shababek.curtains' },
            { icon: 'fab fa-youtube', url: 'vnd.youtube://www.youtube.com/channel/UCxxxxx' },
            { icon: 'fa-brands fa-x-twitter', url: 'twitter://user?screen_name=ShababekCurtain' },
            { icon: 'fab fa-snapchat', url: 'snapchat://add/shababekcurtin' },
            { icon: 'fab fa-telegram', url: 'tg://resolve?domain=shababekcurtains' }
        ];

        // وظيفة عرض الأيقونات
        function renderIcons() {
            const orbit = document.getElementById('orbit');
            if (!orbit) return;
            
            orbit.innerHTML = '';
            const total = iconsData.length;
            const radius = 130; // نصف قطر الدائرة
            
            iconsData.forEach((item, index) => {
                // حساب الزاوية بالراديان (توزيع متساوي 40 درجة بين كل أيقونة)
                const angle = (index / total) * (2 * Math.PI);
                const x = radius * Math.cos(angle);
                const y = radius * Math.sin(angle);
                
                const icon = document.createElement('a');
                icon.className = 'icon-item';
                icon.href = item.url;
                
                // للروابط المباشرة للتطبيقات، نفتح في نفس الصفحة
                if (item.url.startsWith('whatsapp://') || 
                    item.url.startsWith('instagram://') || 
                    item.url.startsWith('fb://') || 
                    item.url.startsWith('tiktok://') || 
                    item.url.startsWith('vnd.youtube://') || 
                    item.url.startsWith('twitter://') || 
                    item.url.startsWith('snapchat://') || 
                    item.url.startsWith('tg://')) {
                    icon.setAttribute('target', '_self');
                } else {
                    icon.setAttribute('target', '_blank');
                    icon.setAttribute('rel', 'noopener noreferrer');
                }
                
                icon.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
                
                icon.innerHTML = `<div class="icon-circle"><i class="${item.icon}"></i></div>`;
                
                // إيقاف الدوران عند النقر
                icon.addEventListener('click', (e) => {
                    const orbit = document.getElementById('orbit');
                    orbit.classList.add('paused');
                    
                    // استئناف الدوران بعد ثانيتين
                    setTimeout(() => {
                        orbit.classList.remove('paused');
                    }, 2000);
                    
                    // السماح بفتح الرابط بشكل طبيعي
                    return true;
                });
                
                orbit.appendChild(icon);
            });
        }

        // تشغيل الدالة عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', renderIcons);
    </script>
</body>
</html>
